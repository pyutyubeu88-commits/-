<style>

:root{--bg:#07080f;--panel:#0c0e1c;--bdr:#181c32;--tx1:#eaecf8;--tx2:#5a6490;--tx3:#222848}

.topbar{display:flex;align-items:center;justify-content:space-between;padding:8px 18px;

.logo-sub{font-size:9px;color:var(--tx2)}
.live-badge{display:flex;align-items:center;gap:5px;background:rgba(16,185,129,.1);

.live-dot{width:6px;height:6px;border-radius:50%;background:#10b981;animation:pulse 1.4s ease infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
.api-wrap{display:flex;gap:6px}
.api-inp{background:rgba(255,255,255,.04);border:1px solid var(--bdr);border-radius:8px;
  padding:5px 10px;color:var(--tx1);font-size:11px;width:215px;outline:none}
.api-inp:focus{border-color:#f59e0b}
.api-btn{padding:5px 14px;background:#f59e0b;color:#000;border:none;border-radius:8px;
  font-size:11px;font-weight:700;cursor:pointer}
.api-btn:hover{background:#d97706}

.main{display:flex;flex:1;overflow:hidden}

.cvs-wrap{flex:1;position:relative;background:#060810;overflow:hidden}
#cvs{display:block;width:100%;height:100%;cursor:default}

.panel{width:310px;flex-shrink:0;background:var(--panel);border-left:1px solid var(--bdr);
  display:flex;flex-direction:column;overflow:hidden}

.exp-hdr{display:flex;align-items:center;gap:11px;padding:12px 14px;

.exp-av{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;

.exp-name{font-size:12.5px;font-weight:900;margin-bottom:2px}
.exp-role{font-size:9px;color:var(--tx2);margin-bottom:4px}
.exp-status{display:flex;align-items:center;gap:5px}
.s-dot{width:6px;height:6px;border-radius:50%;background:#10b981}
.s-txt{font-size:8.5px;color:var(--tx2)}

.qbtns{display:flex;flex-wrap:wrap;gap:5px;padding:9px 12px;border-bottom:1px solid var(--bdr);flex-shrink:0}
.qbtn{background:rgba(255,255,255,.03);border:1px solid var(--bdr);border-radius:12px;
  padding:3px 10px;font-size:9px;color:var(--tx2);cursor:pointer;transition:.15s}
.qbtn:hover{color:var(--cacc,#f59e0b);border-color:var(--cacc,#f59e0b)}

.empty-chat{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;

.empty-icon{font-size:40px;opacity:.35}
.empty-txt{font-size:11px;line-height:1.8}

.msg{display:flex;gap:7px;animation:fup .2s ease}

.msg.me{flex-direction:row-reverse}

/* ── COLOR UTILS ── */
function shade(hex,n){
  if(!hex||hex.length<7)return hex||'#888';
  const v=parseInt(hex.slice(1),16);
  const r=Math.min(255,Math.max(0,(v>>16)+n));
  const g=Math.min(255,Math.max(0,((v>>8)&0xff)+n));
  const b=Math.min(255,Math.max(0,(v&0xff)+n));
  return '#'+[r,g,b].map(c=>c.toString(16).padStart(2,'0')).join('');
}
function rga(hex,a){
  if(!hex||hex.length<7)return `rgba(128,128,128,${a})`;
  const v=parseInt(hex.slice(1),16);
  return `rgba(${v>>16},${(v>>8)&0xff},${v&0xff},${a})`;
}

let CW,CH,DPR=1;

const VW=880, VH=520;
let OX=0,OY=0,SC=1;

function resize(){
  const wrap=cvs.parentElement;
  DPR=window.devicePixelRatio||1;
  CW=wrap.clientWidth; CH=wrap.clientHeight;
  cvs.width=CW*DPR; cvs.height=CH*DPR;
  cvs.style.width=CW+'px'; cvs.style.height=CH+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
  SC=Math.min(CW/VW,CH/VH);
  OX=(CW-VW*SC)/2; OY=(CH-VH*SC)/2;
}
window.addEventListener('resize',resize);

const ty=vy=>OY+vy*SC;
const ts=s=>s*SC;

      a:1,text:EMOJIS[Math.floor(Math.random()*EMOJIS.length)],
      size:10+Math.random()*6, color
    });
  }
}

   DRAW — BACKGROUND

function drawBG(){
  // Wall
  const wGrad=ctx.createLinearGradient(0,0,0,ty(WALL_Y+15));
  wGrad.addColorStop(0,'#08091a');
  wGrad.addColorStop(1,'#0c0e20');
  ctx.fillStyle=wGrad;
  ctx.fillRect(0,0,CW,ty(WALL_Y+15));

  // Wall trim
  ctx.fillStyle='#1a2040';
  ctx.fillRect(0,ty(WALL_Y),CW,ts(5));

  // Floor gradient
  const fGrad=ctx.createLinearGradient(0,ty(WALL_Y),0,CH);
  fGrad.addColorStop(0,'#1c1508');
  fGrad.addColorStop(0.5,'#181204');
  fGrad.addColorStop(1,'#120e02');
  ctx.fillStyle=fGrad;
  ctx.fillRect(0,ty(WALL_Y)+ts(5),CW,CH);

  // Floor tile grid
  ctx.strokeStyle='rgba(255,220,150,.028)';
  ctx.lineWidth=ts(.7);
  const tile=ts(64);
  for(let x=(OX%tile+tile)%tile;x<CW;x+=tile){
    ctx.beginPath();ctx.moveTo(x,ty(WALL_Y));ctx.lineTo(x,CH);ctx.stroke();
  }
  for(let y=ty(WALL_Y);y<CH;y+=tile){
    ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(CW,y);ctx.stroke();
  }
}

/* ── WINDOWS ── */
function drawWindows(t){
  [80,255,510,685].forEach((vx,i)=>{
    const x=tx(vx),y=ty(18),w=ts(108),h=ts(80);
    // Window glow on floor
    const g=ctx.createRadialGradient(x+w/2,ty(WALL_Y),0,x+w/2,ty(WALL_Y),ts(100));
    g.addColorStop(0,'rgba(50,80,180,.07)');
    g.addColorStop(1,'rgba(50,80,180,0)');
    ctx.fillStyle=g;
    ctx.fillRect(x-ts(40),ty(WALL_Y),w+ts(80),ts(70));

    // Frame
    ctx.fillStyle='#181e38';
    roundRect(ctx,x-ts(3),y-ts(3),w+ts(6),h+ts(6),ts(5));
    ctx.fill();

    // Glass
    const gGrad=ctx.createLinearGradient(x,y,x,y+h);
    gGrad.addColorStop(0,'#0c1840');
    gGrad.addColorStop(1,'#060d24');
    ctx.fillStyle=gGrad;
    roundRect(ctx,x,y,w,h,ts(3));
    ctx.fill();

    // Dividers
    ctx.strokeStyle='#181e38';
    ctx.lineWidth=ts(2);
    ctx.beginPath();
    ctx.moveTo(x+w/2,y);ctx.lineTo(x+w/2,y+h);
    ctx.moveTo(x,y+h/2);ctx.lineTo(x+w,y+h/2);
    ctx.stroke();

    // Buildings
    for(let b=0;b<8;b++){
      const bx=x+(b/8)*w;
      const bw=w/8-ts(.5);
      const bh=ts(12+(b*7+i*3)%28);
      ctx.fillStyle='#060a1a';
      ctx.fillRect(bx,y+h-bh,bw,bh);
      // Lit windows
      for(let r=0;r<4;r++)for(let c=0;c<2;c++){
        if((b+r+c+i)%3!==0){
          ctx.fillStyle=`rgba(255,210,80,${.3+(.1*Math.sin(t*.001+b+r+i))})`;
          ctx.fillRect(bx+c*(bw/2)+ts(1.5),y+h-bh+r*ts(6)+ts(2),ts(2.5),ts(3.5));
        }
      }
    }
    // Glass sheen
    ctx.fillStyle='rgba(100,140,255,.035)';
    ctx.fillRect(x,y,w*.45,h);
    ctx.fillStyle='rgba(255,255,255,.018)';
    ctx.fillRect(x+ts(3),y+ts(4),ts(6),h-ts(8));
  });
}

/* ── SIGN & CLOCK ── */
function drawSignClock(t){
  // Sign
  const sx=tx(440),sy=ty(78);
  const txt='⚡ BILLION DOLLAR BOARD';
  ctx.font=`900 ${ts(11)}px 'Space Grotesk',sans-serif`;
  const sw=ctx.measureText(txt).width+ts(24);
  ctx.shadowColor='#f59e0b';ctx.shadowBlur=ts(18);
  ctx.fillStyle='rgba(245,158,11,.07)';
  roundRect(ctx,sx-sw/2,sy-ts(11),sw,ts(22),ts(4));ctx.fill();
  ctx.strokeStyle='rgba(245,158,11,.38)';ctx.lineWidth=ts(.9);
  roundRect(ctx,sx-sw/2,sy-ts(11),sw,ts(22),ts(4));ctx.stroke();
  ctx.fillStyle='#f59e0b';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(txt,sx,sy);
  ctx.shadowBlur=0;

  // Clock
  const cx=tx(832),cy=ty(65),r=ts(22);
  ctx.fillStyle='#0c0f22';
  ctx.strokeStyle='#1e2248';ctx.lineWidth=ts(2.5);
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill();ctx.stroke();

  for(let i=0;i<12;i++){
    const a=i/12*Math.PI*2-Math.PI/2;
    const big=i%3===0;
    ctx.strokeStyle=big?'#f59e0b':'#1e2248';
    ctx.lineWidth=ts(big?1.5:1);
    ctx.beginPath();
    ctx.moveTo(cx+Math.cos(a)*(r-ts(3)),cy+Math.sin(a)*(r-ts(3)));
    ctx.lineTo(cx+Math.cos(a)*(r-ts(3)-(big?5:3)),cy+Math.sin(a)*(r-ts(3)-(big?5:3)));
    ctx.stroke();
  }
  const now=new Date(),h=now.getHours()%12,m=now.getMinutes();
  [[( h*60+m)/720*Math.PI*2-Math.PI/2,r*.56,ts(2),'#f59e0b'],
   [m/60*Math.PI*2-Math.PI/2,r*.76,ts(1.4),'#c8ccf0']].forEach(([a,l,w,col])=>{
    ctx.strokeStyle=col;ctx.lineWidth=w;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+Math.cos(a)*l,cy+Math.sin(a)*l);ctx.stroke();
  });
  ctx.fillStyle='#f59e0b';ctx.beginPath();ctx.arc(cx,cy,ts(2.5),0,Math.PI*2);ctx.fill();
}

/* ── PLANTS ── */
function drawPlant(vx,vy,t){
  const x=tx(vx),y=ty(vy);
  // Pot
  ctx.fillStyle='#281808';
  ctx.beginPath();ctx.moveTo(x-ts(8),y+ts(8));ctx.lineTo(x+ts(8),y+ts(8));
  ctx.lineTo(x+ts(6),y+ts(17));ctx.lineTo(x-ts(6),y+ts(17));ctx.closePath();ctx.fill();
  ctx.fillStyle='#3a2410';
  ctx.fillRect(x-ts(9.5),y+ts(6),ts(19),ts(4));

  // Leaves
  const cols=['#1a5c18','#1e6a1e','#145a12','#16641a'];
  for(let l=0;l<6;l++){
    const a=(l/6)*Math.PI*2-Math.PI/2+Math.sin(t*.0006+l*.8)*0.06;
    const len=ts(13+l%2*5);
    ctx.fillStyle=cols[l%cols.length];
    ctx.save();ctx.translate(x,y+ts(2));ctx.rotate(a);
    ctx.beginPath();ctx.ellipse(len*.5,0,len*.5,ts(4.5),0,0,Math.PI*2);
    ctx.fill();
    ctx.strokeStyle='rgba(40,140,40,.4)';ctx.lineWidth=ts(.7);
    ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(len,0);ctx.stroke();
    ctx.restore();
  }
}

/* ── DESK ── */
function drawDesk(vx,vy,e,t){
  const x=tx(vx),y=ty(vy);
  const dw=ts(115),dh=ts(52),r=ts(5);

  // Area glow
  const ag=ctx.createRadialGradient(x,y,0,x,y,ts(85));
  ag.addColorStop(0,rga(e.acc,.055));
  ag.addColorStop(1,rga(e.acc,0));
  ctx.fillStyle=ag;
  ctx.beginPath();ctx.ellipse(x,y+ts(25),ts(85),ts(55),0,0,Math.PI*2);ctx.fill();

  // Desk shadow
  ctx.save();
  ctx.shadowColor='rgba(0,0,0,.55)';ctx.shadowBlur=ts(12);ctx.shadowOffsetY=ts(5);
  const dg=ctx.createLinearGradient(x,y-dh/2,x,y+dh/2);
  dg.addColorStop(0,'#7a5c28');
  dg.addColorStop(.35,'#604818');
  dg.addColorStop(1,'#3c2a08');
  ctx.fillStyle=dg;
  roundRect(ctx,x-dw/2,y-dh/2,dw,dh,r);ctx.fill();
  ctx.restore();

  // Desk highlight
  ctx.fillStyle='rgba(255,255,255,.045)';
  roundRect(ctx,x-dw/2+ts(4),y-dh/2+ts(3),dw-ts(8),ts(9),ts(3));ctx.fill();

  // Monitor
  const mx=x+ts(12),my=y-ts(6);
  const mw=ts(44),mh=ts(33);
  ctx.save();
  ctx.shadowColor=rga(e.acc,.6);ctx.shadowBlur=ts(14);
  ctx.fillStyle='#07080e';ctx.strokeStyle='#181a28';ctx.lineWidth=ts(1.5);
  roundRect(ctx,mx-mw/2,my-mh/2,mw,mh,ts(3));ctx.fill();ctx.stroke();
  ctx.restore();

  // Screen
  const sg=ctx.createLinearGradient(mx-mw/2+ts(2),0,mx+mw/2-ts(2),0);
  sg.addColorStop(0,rga(e.acc,.2));sg.addColorStop(1,rga(e.acc,.07));
  ctx.fillStyle=sg;
  ctx.fillRect(mx-mw/2+ts(2),my-mh/2+ts(2),mw-ts(4),mh-ts(4));

  // Scanline
  const sl=(t*.025%(mh-ts(4)));
  ctx.fillStyle=rga(e.acc,.1);
  ctx.fillRect(mx-mw/2+ts(2),my-mh/2+ts(2)+sl,mw-ts(4),ts(2));

  // Stand
  ctx.fillStyle='#0e1018';
  ctx.fillRect(mx-ts(4),my+mh/2,ts(8),ts(5));
  ctx.fillRect(mx-ts(11),my+mh/2+ts(5),ts(22),ts(3));

  // Coffee mug
  const cofx=x-ts(36),cofy=y+ts(6);
  ctx.fillStyle='#1a1a28';
  ctx.beginPath();ctx.ellipse(cofx,cofy,ts(8),ts(5.5),0,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle=rga(e.acc,.55);ctx.lineWidth=ts(1.2);
  ctx.beginPath();ctx.ellipse(cofx,cofy,ts(8),ts(5.5),0,0,Math.PI*2);ctx.stroke();
  // Steam
  for(let s=0;s<2;s++){
    const p=(t*.0018+s*.6)%1;
    ctx.save();ctx.globalAlpha=(1-p)*.45;
    ctx.strokeStyle=rga(e.acc,.9);ctx.lineWidth=ts(.8);
    ctx.beginPath();
    const sx=cofx+(s-.5)*ts(5),sy=cofy-ts(5)-p*ts(12);
    ctx.moveTo(sx,sy+ts(12)*p);
    ctx.quadraticCurveTo(sx+ts(4),sy+ts(6)*p,sx,sy);
    ctx.stroke();ctx.restore();
  }

  // Nameplate
  const npy=y+dh/2-ts(8.5);
  const npname=e.name.split(' ').pop().toUpperCase();
  ctx.font=`700 ${ts(7)}px 'Space Grotesk',sans-serif`;
  const npw=ctx.measureText(npname).width+ts(12);
  ctx.fillStyle=rga(e.acc,.18);ctx.strokeStyle=rga(e.acc,.45);ctx.lineWidth=ts(.8);
  roundRect(ctx,x-npw/2,npy-ts(5.5),npw,ts(11),ts(5.5));ctx.fill();ctx.stroke();
  ctx.fillStyle=e.acc;ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(npname,x,npy);
}

/* ── CHARACTER ── */
function drawChar(c,t){
  const {x,y,e,state,selected,phase,glowPh,walkPh}=c;
  const sx=tx(x),sy=ty(y);
  const R=ts(13.5), bodyR=ts(9.5);

  // Bob animation
  const bob= state==='idle'?Math.sin(phase+t*.0012)*ts(1.6):
             state==='walking'?Math.sin(walkPh)*ts(1.8):0;

  // Shadow
  ctx.save();ctx.globalAlpha=.32;
  ctx.fillStyle='#000';
  ctx.beginPath();ctx.ellipse(sx,sy+ts(20)+bob*.25,ts(selected?19:15),ts(4.5),0,0,Math.PI*2);
  ctx.fill();ctx.restore();

  // Selection ring (dashed glow)
  if(selected){
    ctx.save();
    const pulse=.65+Math.sin(glowPh+t*.0028)*.35;
    ctx.globalAlpha=pulse;
    ctx.shadowColor=e.acc;ctx.shadowBlur=ts(16);
    ctx.strokeStyle=e.acc;ctx.lineWidth=ts(2.4);
    ctx.setLineDash([ts(5),ts(3.5)]);
    ctx.beginPath();ctx.arc(sx,sy+bob+ts(5),ts(23),0,Math.PI*2);ctx.stroke();
    ctx.setLineDash([]);ctx.restore();
  }

  // Body (outfit — top-down ellipse)
  const bg=ctx.createRadialGradient(sx-bodyR*.3,sy+ts(8)+bob-bodyR*.3,0,sx,sy+ts(8)+bob,bodyR*1.5);
  bg.addColorStop(0,shade(e.body,30));bg.addColorStop(1,e.body);
  ctx.fillStyle=bg;
  ctx.beginPath();ctx.ellipse(sx,sy+ts(8)+bob,bodyR*1.25,bodyR,0,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle=rga(e.acc,.4);ctx.lineWidth=ts(.9);
  ctx.beginPath();ctx.ellipse(sx,sy+ts(8)+bob,bodyR*1.25,bodyR,0,0,Math.PI*2);ctx.stroke();

  // Head
  const headGrad=ctx.createRadialGradient(sx-R*.22,sy+bob-R*.22,R*.08,sx,sy+bob,R*1.1);
  headGrad.addColorStop(0,shade(e.skin,40));
  headGrad.addColorStop(.6,e.skin);
  headGrad.addColorStop(1,e.skinD);
  ctx.fillStyle=headGrad;
  ctx.beginPath();ctx.arc(sx,sy+bob,R,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle=rga(e.skinD,.35);ctx.lineWidth=ts(.6);
  ctx.beginPath();ctx.arc(sx,sy+bob,R,0,Math.PI*2);ctx.stroke();

  // Hair
  drawHairTopDown(ctx,sx,sy+bob,R,e,t);

  // Face (eyes + mouth from above)
  drawFaceTopDown(ctx,sx,sy+bob,R,e);

  // Glasses
  if(e.id==='godin'||e.id==='kennedy'){
    const ey=sy+bob+ts(2);
    ctx.strokeStyle=shade(e.acc,-5);ctx.lineWidth=ts(.8);
    [-ts(5),ts(5)].forEach(ex=>{
      ctx.beginPath();ctx.arc(sx+ex,ey,ts(3.2),0,Math.PI*2);ctx.stroke();
    });
    ctx.beginPath();ctx.moveTo(sx-ts(5)+ts(3.2),ey);ctx.lineTo(sx+ts(5)-ts(3.2),ey);ctx.stroke();
  }

  // Status dot
  const dotColor= state==='idle'?'#10b981':state==='thinking'?'#f59e0b':
                  state==='working'?'#8b5cf6':'#3b82f6';
  ctx.save();
  ctx.globalAlpha=.6+Math.sin(t*.005+c.i)*.4;
  ctx.shadowColor=dotColor;ctx.shadowBlur=ts(7);
  ctx.fillStyle=dotColor;
  ctx.beginPath();ctx.arc(sx+ts(13),sy+bob-ts(13),ts(3.5),0,Math.PI*2);ctx.fill();
  ctx.restore();

  // Name tag
  const nameY=sy+bob+ts(28);
  const shortName=e.name.split(' ').pop();
  ctx.font=`700 ${ts(8.5)}px 'Noto Sans KR',sans-serif`;
  const nw=ctx.measureText(shortName).width+ts(12);
  ctx.fillStyle=rga(e.acc,selected?.28:.12);
  ctx.strokeStyle=rga(e.acc,selected?.75:.35);
  ctx.lineWidth=ts(.8);
  roundRect(ctx,sx-nw/2,nameY-ts(7),nw,ts(14),ts(7));ctx.fill();ctx.stroke();
  ctx.fillStyle=selected?'#fff':e.acc;
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(shortName,sx,nameY);

  // State label
  if(state!=='idle'&&state!=='walking'){
    const label= state==='thinking'?'💭 분석 중':state==='working'?'⌨️ 작성 중':'💬 답변 중';
    const ly=sy+bob-ts(34);
    ctx.font=`${ts(8)}px 'Noto Sans KR',sans-serif`;
    const lw=ctx.measureText(label).width+ts(14);
    ctx.fillStyle='rgba(8,10,24,.88)';
    ctx.strokeStyle=rga(e.acc,.5);ctx.lineWidth=ts(.8);
    roundRect(ctx,sx-lw/2,ly-ts(8.5),lw,ts(17),ts(8.5));ctx.fill();ctx.stroke();
    ctx.fillStyle='#eaecf8';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(label,sx,ly);
  }

  // Speech bubble
  if(c.bubble){
    drawBubble(ctx,sx,sy+bob-ts(40),c.bubble,t);
  }
}

function drawHairTopDown(ctx,sx,sy,R,e,t){
  if(!e.hair&&e.hairStyle!=='bald')return;
  const hc=e.hair||'';
  if(e.hairStyle==='bald'){
    ctx.fillStyle='rgba(255,255,255,.07)';
    ctx.beginPath();ctx.ellipse(sx-ts(4),sy-ts(4),ts(7),ts(4.5),-0.5,0,Math.PI*2);ctx.fill();
    return;
  }
  ctx.fillStyle=hc;
  switch(e.hairStyle){
    case 'buzzcut':
      ctx.beginPath();ctx.arc(sx,sy,R-ts(1),Math.PI,0);ctx.fill();
      ctx.fillStyle=shade(hc,18);
      ctx.beginPath();ctx.ellipse(sx,sy-ts(2),R*.55,ts(5.5),0,0,Math.PI*2);ctx.fill();
      break;
    case 'slick':
      ctx.beginPath();ctx.arc(sx,sy,R-ts(1),Math.PI,0);ctx.fill();
      ctx.fillStyle=shade(hc,22);
      ctx.beginPath();ctx.ellipse(sx-R*.25,sy-ts(5),R*.65,R*.4,-0.35,0,Math.PI);ctx.fill();
      break;
    case 'messy':
      for(let i=0;i<5;i++){
        const a=Math.PI+(i/4)*Math.PI;
        ctx.beginPath();ctx.arc(sx+Math.cos(a)*ts(4),sy+Math.sin(a)*ts(3.5),ts(9+i%2*3.5),0,Math.PI*2);ctx.fill();
      }
      break;
    case 'styled':
      ctx.beginPath();ctx.arc(sx,sy,R-ts(1),Math.PI,0);ctx.fill();
      ctx.beginPath();ctx.ellipse(sx-R*.1,sy-R*.85,ts(7.5),ts(11),-0.3,0,Math.PI*2);ctx.fill();
      break;
    case 'wavy':
      ctx.beginPath();ctx.arc(sx,sy,R-ts(1),Math.PI,0);ctx.fill();
      ctx.beginPath();ctx.ellipse(sx-R*.82,sy,ts(4.5),ts(9.5),.2,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.ellipse(sx+R*.82,sy,ts(4.5),ts(9.5),-.2,0,Math.PI*2);ctx.fill();
      break;
    case 'silver':
      ctx.fillStyle=hc;
      ctx.beginPath();ctx.arc(sx,sy,R-ts(1),Math.PI,0);ctx.fill();
      ctx.fillStyle='rgba(255,255,255,.32)';
      ctx.beginPath();ctx.ellipse(sx,sy-ts(6),R*.58,ts(5.5),0,0,Math.PI*2);ctx.fill();
      break;
    case 'tall':
      ctx.beginPath();ctx.arc(sx,sy,R-ts(1),Math.PI,0);ctx.fill();
      ctx.beginPath();ctx.ellipse(sx,sy-R*.92,ts(9),ts(13.5),0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle=shade(hc,22);
      ctx.beginPath();ctx.ellipse(sx,sy-R*1.1,ts(5.5),ts(8),0,0,Math.PI*2);ctx.fill();
      break;
    default:
      ctx.beginPath();ctx.arc(sx,sy,R-ts(1),Math.PI,0);ctx.fill();
  }
}

function drawFaceTopDown(ctx,sx,sy,R,e){
  // Eyes
  const ey=sy+ts(2);
  const esp=ts(5.5);
  [sx-esp,sx+esp].forEach(ex=>{
    ctx.fillStyle='white';
    ctx.beginPath();ctx.arc(ex,ey,ts(2.8),0,Math.PI*2);ctx.fill();
    ctx.fillStyle=e.eye||'#4040a0';
    ctx.beginPath();ctx.arc(ex,ey,ts(1.8),0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#01000e';
    ctx.beginPath();ctx.arc(ex,ey,ts(.9),0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.9)';
    ctx.beginPath();ctx.arc(ex+ts(.7),ey-ts(.7),ts(.55),0,Math.PI*2);ctx.fill();
  });
  // Mouth
  ctx.strokeStyle=rga(e.skinD,.85);ctx.lineWidth=ts(1.1);
  if(e.mouth==='grin'||e.mouth==='smile'){
    ctx.beginPath();ctx.arc(sx,ey+ts(5.5),ts(3.5),.2,Math.PI-.2);ctx.stroke();
  }else if(e.mouth==='smirk'){
    ctx.beginPath();ctx.moveTo(sx-ts(2),ey+ts(5.5));
    ctx.quadraticCurveTo(sx+ts(2),ey+ts(6.5),sx+ts(4),ey+ts(5.5));ctx.stroke();
  }else{
    ctx.beginPath();ctx.moveTo(sx-ts(3),ey+ts(6));ctx.lineTo(sx+ts(3),ey+ts(6));ctx.stroke();
  }
}

function drawBubble(ctx,bx,by,bubble,t){
  const text=bubble.text;
  ctx.font=`${ts(8.5)}px 'Noto Sans KR',sans-serif`;
  const tw=ctx.measureText(text).width;
  const bw=Math.min(tw+ts(18),ts(160)),bh=ts(28);

  ctx.save();
  ctx.globalAlpha=Math.min(1,bubble.alpha);
  ctx.fillStyle='white';
  ctx.shadowColor='rgba(0,0,0,.35)';ctx.shadowBlur=ts(7);
  roundRect(ctx,bx-bw/2,by-bh/2,bw,bh,ts(10));ctx.fill();
  ctx.shadowBlur=0;
  // Tail
  ctx.beginPath();
  ctx.moveTo(bx-ts(5),by+bh/2);
  ctx.lineTo(bx,by+bh/2+ts(9));
  ctx.lineTo(bx+ts(5),by+bh/2);
  ctx.closePath();ctx.fill();
  // Text
  const disp=text.length>20?text.slice(0,18)+'…':text;
  ctx.fillStyle='#111';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(disp,bx,by);
  ctx.restore();
}

/* ── PARTICLES ── */
function drawParts(){
  for(let i=PARTS.length-1;i>=0;i--){
    const p=PARTS[i];
    ctx.save();ctx.globalAlpha=p.a;
    ctx.font=`${p.size*SC}px sans-serif`;
    ctx.textAlign='center';
    ctx.fillText(p.text,tx(p.x),ty(p.y));
    ctx.restore();
    p.x+=p.vx;p.y+=p.vy;p.a-=.009;
    if(p.a<=0)PARTS.splice(i,1);
  }
}

/* ── UTILS ── */
function roundRect(ctx,x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);return;}
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}

/* ══════════════════════════════
   UPDATE
══════════════════════════════ */
function update(t){
  CHARS.forEach(c=>{
    c.phase+=.022;
    c.glowPh+=.033;

    if(c.state==='walking'){
      c.walkPh+=.22;
      const dx=c.tx-c.x,dy=c.ty-c.y;
      const dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<1.5){
        c.x=c.tx;c.y=c.ty;
        c.state='idle';c.walkPh=0;
      }else{
        const spd=1.4;
        c.x+=dx/dist*spd;c.y+=dy/dist*spd;
      }
    }

    // Bubble fade
    if(c.bubble){
      c.bubble.life--;
      if(c.bubble.life<60)c.bubble.alpha=c.bubble.life/60;
      if(c.bubble.life<=0)c.bubble=null;
    }

    // Random idle movement
    if(c.state==='idle'&&!c.selected){
      c.idleTimer--;
      if(c.idleTimer<=0){
        c.idleTimer=Math.random()*280+180;
        doRandomMove(c);
      }
    }
    c.actIdx=Math.floor(t/3000+c.i*37)%c.e.acts.length;
  });
}

function doRandomMove(c){
  const r=Math.random();
  if(r<.55){
    c.tx=c.homeX+(Math.random()-.5)*28;
    c.ty=c.homeY+(Math.random()-.5)*22;
  }else if(r<.82){
    const o=CHARS[Math.floor(Math.random()*CHARS.length)];
    c.tx=o.homeX+(Math.random()-.5)*34;
    c.ty=o.homeY+28;
    c.bubble={text:['💬 논의 중','👋','📊 공유 중','🤝'][Math.floor(Math.random()*4)],life:130,alpha:1};
  }else{
    c.tx=380+(Math.random()-.5)*130;
    c.ty=285+(Math.random()-.5)*60;
  }
  if(Math.abs(c.tx-c.x)>3||Math.abs(c.ty-c.y)>3)c.state='walking';
}

/* ══════════════════════════════
   RENDER
══════════════════════════════ */
function render(t){
  ctx.clearRect(0,0,CW,CH);
  drawBG();
  drawWindows(t);
  drawSignClock(t);

  // Plants
  const PLANTS=[[32,130],[32,480],[848,130],[848,480],[205,290],[670,290]];
  PLANTS.forEach(([vx,vy])=>drawPlant(vx,vy,t));

  // Build render list (desks + chars) Y-sorted
  const renderList=[];
  DESK_POS.forEach((dp,i)=>{
    renderList.push({sortY:dp.y+28,fn:()=>drawDesk(dp.x,dp.y,EX[i],t)});
  });
  CHARS.forEach(c=>{
    renderList.push({sortY:c.y+18,fn:()=>drawChar(c,t)});
  });
  renderList.sort((a,b)=>a.sortY-b.sortY);
  renderList.forEach(r=>r.fn());

  drawParts();
}

/* ── MAIN LOOP ── */
let _raf;
function loop(t){
  update(t);render(t);
  _raf=requestAnimationFrame(loop);
}

/* ══════════════════════════════
   INTERACTION
══════════════════════════════ */
cvs.addEventListener('click',e=>{
  const rect=cvs.getBoundingClientRect();
  const mx=e.clientX-rect.left,my=e.clientY-rect.top;
  let hit=null,best=Infinity;
  CHARS.forEach(c=>{
    const d=Math.hypot(mx-tx(c.x),my-ty(c.y));
    if(d<ts(24)&&d<best){best=d;hit=c;}
  });
  if(hit)selectChar(hit);
});

cvs.addEventListener('mousemove',e=>{
  const rect=cvs.getBoundingClientRect();
  const mx=e.clientX-rect.left,my=e.clientY-rect.top;
  let hov=false;
  CHARS.forEach(c=>{if(Math.hypot(mx-tx(c.x),my-ty(c.y))<ts(26))hov=true;});
  cvs.style.cursor=hov?'pointer':'default';
});

function selectChar(c){
  CHARS.forEach(ch=>ch.selected=false);
  c.selected=true;
  selChar=c;

  const e=c.e;
  document.getElementById('expHdr').style.display='flex';
  document.getElementById('qbtns').style.display='flex';
  document.getElementById('inpRow').style.display='flex';

  const av=document.getElementById('expAv');
  av.textContent=e.emoji;
  av.style.background=rga(e.acc,.18);
  av.style.border=`2px solid ${rga(e.acc,.45)}`;

  document.getElementById('expName').textContent=e.name;
  document.getElementById('expRole').textContent=e.role;
  setStatus('idle');

  document.getElementById('panel').style.setProperty('--cacc',e.acc);
  ['td1','td2','td3'].forEach(id=>{document.getElementById(id).style.background=e.acc;});

  document.getElementById('qbtns').innerHTML=e.qs.map(q=>
    `<span class="qbtn" onclick="fill('${q}')">${q}</span>`
  ).join('');

  // Clear placeholder
  const log=document.getElementById('chatlog');
  const ph=log.querySelector('.empty-chat');
  if(ph)ph.remove();
  if(!log.children.length){
    const div=document.createElement('div');
    div.style.cssText='text-align:center;padding:18px 0;color:#222848;font-size:11px';
    div.textContent='💬 질문을 입력해보세요';
    log.appendChild(div);
  }

  c.bubble={text:`👋 안녕하세요!`,life:160,alpha:1};
  c.tx=c.homeX+(Math.random()-.5)*16;
  c.ty=c.homeY-12;

  spawnParts(c.x,c.y-25,e.acc,5);
  addFeed(e.name,'선택됨 · 대화 시작');
}

/* ── CHAT ── */
function fill(t){
  document.getElementById('cinp').value=t;
  document.getElementById('cinp').focus();
}

async function send(){
  if(busy||!selChar)return;
  if(!apiKey){toast('먼저 API 키를 입력하고 연결 버튼을 눌러주세요');return;}
  const inp=document.getElementById('cinp');
  const q=inp.value.trim();if(!q)return;
  busy=true;inp.value='';
  document.getElementById('sbtn').disabled=true;

  const c=selChar,e=c.e;
  addMsg('user','나',q,'🙋','#6366f1',false);
  setStatus('thinking');c.state='thinking';

  document.getElementById('typingRow').classList.add('show');
  await delay(750);
  setStatus('working');c.state='working';

  let ans='';
  try{ans=await callClaude(q,e);}
  catch(err){ans='⚠️ '+(err.message||'API 오류');}

  document.getElementById('typingRow').classList.remove('show');
  setStatus('talking');c.state='talking';
  c.bubble={text:ans.slice(0,28)+'…',life:220,alpha:1};

  addMsg('expert',`${e.emoji} ${e.name}`,ans,e.emoji,e.acc,true);
  addFeed(e.name,ans.slice(0,35)+'…');
  spawnParts(c.x,c.y-30,e.acc,6);

  setTimeout(()=>{setStatus('idle');c.state='idle';},10000);
  busy=false;document.getElementById('sbtn').disabled=false;
}

function setStatus(state){
  const dot=document.getElementById('sDot'),txt=document.getElementById('sTxt');
  const map={idle:['#10b981','대기 중'],thinking:['#f59e0b','분석 중…'],working:['#8b5cf6','작성 중…'],talking:['#3b82f6','답변 중…']};
  const [col,label]=map[state]||map.idle;
  dot.style.background=col;txt.textContent=label;
}

function addMsg(type,name,text,icon,color,isExpert){
  const log=document.getElementById('chatlog');
  const ph=log.querySelector('div[style*="22848"]');if(ph)ph.remove();
  const d=document.createElement('div');
  d.className='msg '+(type==='user'?'me':'');
  d.innerHTML=`<div class="mav ${type==='user'?'u':''}" style="${isExpert?`background:${rga(color,.15)};border:1px solid ${rga(color,.35)};font-size:13px`:''}">${icon}</div>
    <div class="mbody"><div class="mwho">${name}</div>
    <div class="mbubble" style="${isExpert?`border-color:${rga(color,.18)}`:''}">
      ${text.replace(/\n/g,'<br>')}
    </div></div>`;
  log.appendChild(d);log.scrollTop=log.scrollHeight;
}

function addFeed(name,text){
  const list=document.getElementById('feedList');
  const now=new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
  const item=document.createElement('div');
  item.className='feed-item';
  item.innerHTML=`<b>${now} ${name}</b> — ${text}`;
  list.insertBefore(item,list.firstChild);
  feedLog.push(item);
  if(feedLog.length>12){feedLog.shift().remove();}
}

/* ── API ── */
async function callClaude(q,e){
  const prompt=`${e.persona}\n\n사용자 질문: "${q}"\n\n위 전문가로서 핵심 조언:\n- 첫 문장에 핵심 결론\n- 전문가 고유 프레임워크 사용\n- 구체적이고 즉시 실행 가능하게\n- 서론 없이 바로 답변\n- 300자 이내`;
  const res=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':apiKey,
      'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-ipc':'true'},
    body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:500,
      messages:[{role:'user',content:prompt}]})
  });
  if(!res.ok){
    const c=res.status;
    if(c===429)throw new Error('API 한도 초과');
    if(c===401||c===403)throw new Error('API 키 오류 (sk-ant-... 확인)');
    throw new Error(`API 오류 (${c})`);
  }
  const data=await res.json();
  return data?.content?.[0]?.text||'응답 없음';
}

/* ── UTILS ── */
function saveKey(){
  const v=document.getElementById('apiKey').value.trim();
  if(!v){toast('API 키를 입력해주세요');return;}
  apiKey=v;localStorage.setItem('claude_key',v);
  toast('✅ Claude 연결 완료! 팀이 준비됐습니다');
}
function delay(ms){return new Promise(r=>setTimeout(r,ms));}
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

window.onload=()=>{
  if(apiKey)document.getElementById('apiKey').value=apiKey;
