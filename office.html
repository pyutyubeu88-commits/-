<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>억만장자 AI 가상 오피스</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d0e14;--surface:#12141c;--card:#181b26;--bdr:#252840;--tx1:#f0f1f7;--tx2:#8890b0;--tx3:#454d6e}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--tx1);min-height:100vh;overflow-x:hidden}

/* ── TOPBAR ── */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:rgba(18,20,28,.95);border-bottom:1px solid var(--bdr);position:sticky;top:0;z-index:100;backdrop-filter:blur(10px)}
.logo{display:flex;align-items:center;gap:8px}
.logo-icon{font-size:22px}
.logo-name{font-size:15px;font-weight:900}
.logo-sub{font-size:10px;color:var(--tx2)}
.live{display:flex;align-items:center;gap:5px;background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.25);border-radius:20px;padding:4px 10px;font-size:10px;font-weight:700;color:#10b981}
.live-dot{width:6px;height:6px;border-radius:50%;background:#10b981;animation:livepulse 1.5s ease infinite}
@keyframes livepulse{0%,100%{opacity:1}50%{opacity:.3}}
.api-wrap{display:flex;gap:6px}
.api-inp{background:var(--card);border:1px solid var(--bdr);border-radius:8px;padding:6px 10px;color:var(--tx1);font-size:11px;width:200px;outline:none}
.api-inp:focus{border-color:#f59e0b}
.api-btn{padding:6px 12px;background:#f59e0b;color:#000;border:none;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer}
.api-btn:hover{background:#d97706}

/* ── HEADER ── */
.hdr{text-align:center;padding:20px 20px 0}
.hdr-title{font-size:11px;letter-spacing:2px;color:var(--tx3);text-transform:uppercase;margin-bottom:6px}
.hdr-main{font-size:24px;font-weight:900;background:linear-gradient(135deg,#f59e0b 0%,#ef4444 50%,#8b5cf6 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr-sub{font-size:12px;color:var(--tx2);margin-top:4px}

/* ── EXPERT GRID ── */
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:16px 20px}
@media(max-width:900px){.grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:500px){.grid{grid-template-columns:1fr 1fr}}

/* ── EXPERT CARD ── */
.ecard{background:var(--card);border:1px solid var(--bdr);border-radius:16px;padding:14px 12px;position:relative;overflow:hidden;transition:border-color .3s,box-shadow .3s;cursor:pointer}
.ecard::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--acc)}
.ecard.active{border-color:var(--acc);box-shadow:0 0 20px rgba(var(--acc-rgb),.2)}
.ecard:hover{border-color:rgba(var(--acc-rgb),.5)}

/* ── CHIBI CHARACTERS ── */
.chibi-wrap{position:relative;height:110px;display:flex;align-items:flex-end;justify-content:center;margin-bottom:8px}
.chibi{position:relative;width:70px;height:100px;flex-shrink:0}
/* Idle bounce */
.chibi.idle{animation:bounce 2.4s ease-in-out infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
/* Thinking tilt */
.chibi.thinking{animation:tilt 1s ease-in-out infinite alternate}
@keyframes tilt{from{transform:rotate(-4deg) translateY(0)}to{transform:rotate(4deg) translateY(-3px)}}
/* Speaking bounce fast */
.chibi.speaking{animation:spk .35s ease-in-out infinite alternate}
@keyframes spk{from{transform:scaleY(1)}to{transform:scaleY(1.04)}}
/* Working type */
.chibi.working{animation:work .5s ease-in-out infinite alternate}
@keyframes work{from{transform:translateY(0) rotate(-1deg)}to{transform:translateY(-4px) rotate(1deg)}}

/* HEAD */
.ch-head{width:56px;height:58px;border-radius:50%;position:absolute;top:0;left:7px;background:var(--skin,#FBBF8E)}
/* BIG eyes (chibi) */
.ch-eye{width:13px;height:15px;background:#fff;border-radius:50%;position:absolute;top:20px}
.ch-eye.l{left:10px}.ch-eye.r{right:10px}
.ch-pupil{width:8px;height:10px;background:#2d1b4e;border-radius:50%;position:absolute;top:2px;left:2.5px}
.ch-shine{width:3px;height:3px;background:#fff;border-radius:50%;position:absolute;top:2px;right:2px}
.ch-eye.wink{background:#2d1b4e;border-radius:8px;height:4px;top:22px}
/* MOUTH */
.ch-mouth{width:18px;height:9px;position:absolute;bottom:10px;left:50%;transform:translateX(-50%)}
.ch-mouth.smile{border-radius:0 0 10px 10px;background:#c87555;border-top:none}
.ch-mouth.grin{border-radius:0 0 12px 12px;background:#c87555;width:22px}
.ch-mouth.open{border-radius:50%;background:#c87555;height:12px;width:14px}
.ch-mouth.smirk{border-radius:0 0 8px 12px;background:#c87555;width:14px;transform:translateX(-40%) rotate(-5deg)}
/* BROWS */
.ch-brow{width:12px;height:3px;background:#4a3000;border-radius:2px;position:absolute;top:14px}
.ch-brow.l{left:8px}.ch-brow.r{right:8px}
.ch-brow.intense{height:4px;transform:rotate(-8deg)}
.ch-brow.intense.r{transform:rotate(8deg)}
.ch-brow.raised{transform:rotate(-12deg);top:12px}
.ch-brow.raised.r{transform:rotate(12deg)}
/* BODY */
.ch-body{width:50px;height:48px;border-radius:12px 12px 8px 8px;position:absolute;bottom:0;left:10px}
/* HAIR types */
.ch-hair{position:absolute;left:7px;width:56px}
.ch-hair.buzzcut{height:18px;background:var(--hair,#1a1a1a);border-radius:28px 28px 0 0;top:0}
.ch-hair.slick{height:20px;background:var(--hair,#3d2b1a);border-radius:28px 28px 4px 4px;top:0}
.ch-hair.slick::after{content:'';position:absolute;right:-4px;top:14px;width:10px;height:8px;background:var(--hair,#3d2b1a);border-radius:0 8px 8px 0}
.ch-hair.bald{display:none}
.ch-hair.messy{height:22px;background:var(--hair,#1a1a1a);border-radius:26px 26px 0 0;top:-2px}
.ch-hair.messy::before{content:'';position:absolute;top:-4px;left:8px;width:10px;height:10px;background:var(--hair,#1a1a1a);border-radius:50%;transform:rotate(-20deg)}
.ch-hair.messy::after{content:'';position:absolute;top:-6px;right:10px;width:10px;height:12px;background:var(--hair,#1a1a1a);border-radius:50%;transform:rotate(15deg)}
.ch-hair.styled{height:24px;background:var(--hair,#3d2b1a);border-radius:28px 28px 0 0;top:-2px}
.ch-hair.styled::after{content:'';position:absolute;right:0;top:10px;width:8px;height:16px;background:var(--hair,#3d2b1a);border-radius:4px}
.ch-hair.wavy{height:20px;background:var(--hair,#5a3e28);border-radius:28px 28px 0 0;top:0}
.ch-hair.wavy::before{content:'';position:absolute;bottom:-4px;left:2px;width:10px;height:8px;background:var(--hair,#5a3e28);border-radius:0 0 6px 6px}
.ch-hair.wavy::after{content:'';position:absolute;bottom:-4px;right:2px;width:10px;height:8px;background:var(--hair,#5a3e28);border-radius:0 0 6px 6px}
.ch-hair.silver{height:20px;background:#c0c0c0;border-radius:28px 28px 0 0;top:0}
.ch-hair.tall{height:26px;background:var(--hair,#1a1a1a);border-radius:28px 28px 2px 2px;top:-4px}
/* GLASSES */
.ch-glasses{position:absolute;top:19px;left:4px;width:50px;height:14px;pointer-events:none}
.ch-glasses::before,.ch-glasses::after{content:'';position:absolute;width:18px;height:14px;border:2.5px solid rgba(100,100,180,.9);border-radius:50%;background:rgba(150,150,255,.08)}
.ch-glasses::before{left:2px}.ch-glasses::after{right:2px}
/* TIE */
.ch-tie{position:absolute;top:2px;left:50%;transform:translateX(-50%);width:8px;height:18px;background:var(--acc);border-radius:2px 2px 4px 4px}
.ch-tie::before{content:'';position:absolute;top:-4px;left:-2px;width:12px;height:6px;background:var(--acc);border-radius:2px}
/* ARMS */
.ch-arm{width:10px;height:24px;border-radius:5px;background:var(--skin,#FBBF8E);position:absolute;bottom:8px}
.ch-arm.l{left:-2px;transform:rotate(10deg);transform-origin:top center}
.ch-arm.r{right:-2px;transform:rotate(-10deg);transform-origin:top center}
.chibi.working .ch-arm.l{animation:arml .5s ease-in-out infinite alternate}
.chibi.working .ch-arm.r{animation:armr .5s ease-in-out infinite alternate}
@keyframes arml{from{transform:rotate(10deg)}to{transform:rotate(25deg)}}
@keyframes armr{from{transform:rotate(-10deg)}to{transform:rotate(-25deg)}}
/* PROP (emoji) */
.ch-prop{position:absolute;font-size:18px;animation:propbob 2s ease-in-out infinite}
@keyframes propbob{0%,100%{transform:rotate(-5deg)}50%{transform:rotate(5deg)}}

/* THOUGHT / SPEECH BUBBLES */
.thought-bubble{display:none;position:absolute;top:-36px;left:50%;transform:translateX(-50%);background:#fff;color:#333;font-size:11px;font-weight:700;border-radius:12px;padding:5px 10px;white-space:nowrap;z-index:10;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.thought-bubble::after{content:'';position:absolute;bottom:-6px;left:50%;transform:translateX(-50%);width:8px;height:8px;background:#fff;border-radius:50%}
.thought-bubble.show{display:block;animation:fadeup .3s ease}
@keyframes fadeup{from{opacity:0;transform:translateX(-50%) translateY(6px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* MONITOR */
.monitor-wrap{position:relative;width:100%;margin-bottom:8px}
.monitor{background:#0a0c14;border:1px solid #2a2d42;border-radius:8px;padding:8px 10px;min-height:52px;overflow:hidden;position:relative}
.monitor-dot-row{display:flex;gap:4px;margin-bottom:6px}
.mdt{width:6px;height:6px;border-radius:50%}
.monitor-content{font-size:9.5px;color:#6fde9a;font-family:monospace;line-height:1.6;overflow:hidden}
.monitor-line{white-space:nowrap;overflow:hidden;animation:typeout 2.5s linear infinite}
@keyframes typeout{0%{max-width:0}60%,100%{max-width:100%}}
.monitor-line:nth-child(2){animation-delay:.8s}
.monitor-line:nth-child(3){animation-delay:1.6s}
.monitor-standbar{width:30px;height:6px;background:#2a2d42;margin:4px auto 0;border-radius:2px}

/* CARD INFO */
.card-name{font-size:12px;font-weight:900;text-align:center;margin-bottom:2px}
.card-role{font-size:9px;color:var(--tx2);text-align:center;margin-bottom:6px}
.status-row{display:flex;align-items:center;justify-content:center;gap:5px;margin-bottom:8px}
.sdot{width:7px;height:7px;border-radius:50%;background:var(--tx3);flex-shrink:0}
.sdot.on{background:#10b981;box-shadow:0 0 6px #10b981}
.sdot.thinking{background:#f59e0b;animation:livepulse .8s infinite}
.sdot.speaking{background:#3b82f6;animation:livepulse .4s infinite}
.stxt{font-size:9px;color:var(--tx2)}
.activity{font-size:9px;color:var(--tx3);text-align:center;min-height:28px;line-height:1.6;padding:0 4px}

/* RESPONSE BUBBLE */
.resp-bubble{display:none;margin-top:8px;background:rgba(var(--acc-rgb),.08);border:1px solid rgba(var(--acc-rgb),.3);border-radius:10px;padding:8px 10px;font-size:10.5px;line-height:1.7;color:var(--tx1);max-height:120px;overflow-y:auto}
.resp-bubble.show{display:block;animation:fadeup .3s ease}
.typing-dots{display:none;gap:4px;justify-content:center;padding:8px 0}
.typing-dots.show{display:flex}
.tdot{width:7px;height:7px;border-radius:50%;background:var(--acc);animation:tbounce .7s ease infinite}
.tdot:nth-child(2){animation-delay:.15s}
.tdot:nth-child(3){animation-delay:.3s}
@keyframes tbounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}

/* ── BOARDROOM ── */
.boardroom{background:var(--surface);border-top:1px solid var(--bdr);padding:0 20px 24px}
.broom-title{display:flex;align-items:center;gap:10px;padding:14px 0 12px;font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:1px}
.broom-title::before,.broom-title::after{content:'';flex:1;height:1px;background:var(--bdr)}
.chatlog{max-height:260px;overflow-y:auto;display:flex;flex-direction:column;gap:8px;margin-bottom:12px;padding-right:4px}
.chatlog::-webkit-scrollbar{width:3px}
.chatlog::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:2px}
.cmsg{display:flex;gap:8px;animation:fadeup .25s ease}
.cmsg.user{flex-direction:row-reverse}
.cav{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.cav.me{background:linear-gradient(135deg,#6366f1,#8b5cf6)}
.cbody{max-width:72%}
.cwho{font-size:9px;color:var(--tx2);font-weight:700;margin-bottom:2px}
.cmsg.user .cwho{text-align:right}
.cbubble{background:var(--card);border:1px solid var(--bdr);border-radius:10px;padding:8px 12px;font-size:12px;line-height:1.7}
.cmsg.user .cbubble{background:rgba(99,102,241,.12);border-color:rgba(99,102,241,.3)}
.quickbtns{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.qbtn{background:var(--card);border:1px solid var(--bdr);border-radius:20px;padding:5px 12px;font-size:10px;color:var(--tx2);cursor:pointer;transition:.15s;white-space:nowrap}
.qbtn:hover{border-color:#f59e0b;color:#f59e0b}
.input-row{display:flex;gap:8px}
.chat-inp{flex:1;background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:11px 14px;color:var(--tx1);font-size:13px;outline:none;font-family:inherit;resize:none;min-height:48px;max-height:110px}
.chat-inp:focus{border-color:#f59e0b}
.chat-inp::placeholder{color:var(--tx3)}
.sendbtn{padding:11px 18px;background:linear-gradient(135deg,#f59e0b,#ef4444);border:none;border-radius:12px;color:#000;font-weight:900;font-size:13px;cursor:pointer;white-space:nowrap;align-self:flex-end;transition:.2s}
.sendbtn:hover{opacity:.85;transform:scale(1.02)}
.sendbtn:disabled{opacity:.4;cursor:not-allowed;transform:none}

/* ── ROUTER INDICATOR ── */
.router{display:none;text-align:center;font-size:11px;color:var(--tx2);padding:8px;animation:fadeup .3s ease}
.router.show{display:block}
.router span{font-weight:700;color:#f59e0b}

/* ── TOAST ── */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--bdr);border-radius:10px;padding:10px 18px;font-size:12px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,.5)}
.toast.show{opacity:1}

/* ── BLINKING EYES ── */
@keyframes blink{0%,92%,100%{transform:scaleY(1)}96%{transform:scaleY(.05)}}
.ch-eye{animation:blink 3.5s ease-in-out infinite}
.ch-eye.r{animation-delay:.1s}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="logo">
    <div class="logo-icon">🏢</div>
    <div>
      <div class="logo-name">억만장자 AI 가상 오피스</div>
      <div class="logo-sub">Billion Dollar Board · 24H Active</div>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <div class="live"><div class="live-dot"></div>LIVE</div>
    <div class="api-wrap">
      <input class="api-inp" id="apiKey" type="password" placeholder="Claude API 키 입력 (sk-ant-...)">
      <button class="api-btn" onclick="saveKey()">연결</button>
    </div>
  </div>
</div>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-title">Your Personal Advisory Board</div>
  <div class="hdr-main">억만장자 8인이 지금 일하고 있습니다</div>
  <div class="hdr-sub">질문을 던지면 최적의 전문가가 직접 답변합니다</div>
</div>

<!-- EXPERT GRID -->
<div class="grid" id="grid"></div>

<!-- BOARDROOM -->
<div class="boardroom">
  <div class="broom-title">팀 브리핑 룸</div>
  <div class="quickbtns">
    <span class="qbtn" onclick="fill('내 가격 전략 어떻게 바꿔야 할까요?')">💰 가격 전략</span>
    <span class="qbtn" onclick="fill('인스타 콘텐츠 전략 짜줘')">📱 콘텐츠</span>
    <span class="qbtn" onclick="fill('상담 후 계약이 안 됩니다. 클로징 방법')">🤝 클로징</span>
    <span class="qbtn" onclick="fill('포지셔닝과 브랜딩을 어떻게 잡아야 하나요')">🎯 브랜딩</span>
    <span class="qbtn" onclick="fill('퍼널 자동화 설계해줘')">🔄 퍼널</span>
    <span class="qbtn" onclick="fill('의욕이 떨어집니다. 다시 불 붙여줘요')">⚡ 마인드셋</span>
    <span class="qbtn" onclick="fill('광고 카피 5개 만들어줘')">📮 카피</span>
  </div>
  <div class="chatlog" id="chatlog">
    <div style="text-align:center;padding:30px 0;color:var(--tx3);font-size:12px">
      🏢 팀이 대기 중입니다. 비즈니스 고민을 말씀해주세요.
    </div>
  </div>
  <div class="router" id="router">→ <span id="routerName"></span>에게 라우팅 중...</div>
  <div class="input-row">
    <textarea class="chat-inp" id="inp" placeholder="비즈니스 고민을 팀에게 던져보세요..." rows="1"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"></textarea>
    <button class="sendbtn" id="sendbtn" onclick="send()">팀에게 물어보기 →</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>

const EXPERTS = [
  {
    id:'hormozi', name:'Alex Hormozi', role:'오퍼 & 가격 전략',

    prop:{emoji:'💪', x:48, y:55},

    activities:['오퍼 가치 방정식 분석 중','가격 사다리 3단계 설계 중','보증 구조 최적화 중','그랜드슬램 오퍼 작성 중'],
    persona:`당신은 Alex Hormozi입니다. 오퍼 설계와 가격 전략의 세계 최고 전문가. "$100M Offers" 저자. 핵심 철학: "Make your offer so good, people feel stupid saying no." 가치 방정식(꿈의 결과 × 달성 가능성 / 시간 지연 × 노력)을 기반으로 답변합니다. 단도직입적이고 실전적으로. 구체적 숫자와 프레임워크를 반드시 제시하세요. 한국어로 300자 이내 핵심 답변.`,
    keywords:['가격','오퍼','비싸','수익','패키지','보증','LTV','상품','번들','할인','전환']
  },
  {
    id:'cardone', name:'Grant Cardone', role:'10X 영업 & 볼륨',
    emoji:'🚀', acc:'#ef4444', accRgb:'239,68,68',
    skin:'#F0A87A', hair:'#3d2000', hairStyle:'slick', bodyColor:'#cc2222',
    prop:{emoji:'📱', x:46, y:55},
    tie:true, glasses:false,
    eyes:{type:'normal'}, brows:{type:'normal'}, mouth:'grin',

/* ── STATE ── */
let apiKey = localStorage.getItem('claude_key') || '';
let busy = false;

/* ── INIT ── */
window.onload = () => {
  if(apiKey) document.getElementById('apiKey').value = apiKey;
  render();
  startIdleRotation();
};

/* ── RENDER ── */
function render() {
  document.getElementById('grid').innerHTML = EXPERTS.map(e => buildCard(e)).join('');
}

      <div class="thought-bubble" id="thought_${e.id}">💭 분석 중...</div>

/* ── IDLE ACTIVITY ROTATION ── */
function startIdleRotation() {
  setInterval(() => {
    EXPERTS.forEach(e => {
      const card = document.getElementById('card_' + e.id);
      if (!card.classList.contains('active')) {
        const idx = Math.floor(Math.random() * e.activities.length);
        const act = document.getElementById('act_' + e.id);
        if(act) act.textContent = e.activities[idx];
      }
    });
  }, 3500);
}

function spotlight(id) {
  const chibi = document.getElementById('chibi_' + id);
  chibi.style.transform = 'scale(1.15)';
  setTimeout(() => { chibi.style.transform = ''; }, 300);
}

/* ── STATE MANAGEMENT ── */
function setState(id, state) {
  const card  = document.getElementById('card_' + id);
  const chibi = document.getElementById('chibi_' + id);
  const dot   = document.getElementById('dot_' + id);
  const stxt  = document.getElementById('stxt_' + id);
  const thought = document.getElementById('thought_' + id);
  const typing  = document.getElementById('typing_' + id);

  card.classList.remove('active');
  chibi.className = 'chibi';
  dot.className = 'sdot';
  thought.classList.remove('show');
  typing.classList.remove('show');

  if (state === 'thinking') {
    card.classList.add('active');
    chibi.classList.add('thinking');
    dot.classList.add('thinking');
    stxt.textContent = '분석 중...';
    thought.classList.add('show');
  } else if (state === 'working') {
    card.classList.add('active');
    chibi.classList.add('working');
    dot.classList.add('thinking');
    stxt.textContent = '작성 중...';
    typing.classList.add('show');
  } else if (state === 'speaking') {
    card.classList.add('active');
    chibi.classList.add('speaking');
    dot.classList.add('speaking');
    stxt.textContent = '답변 중...';
  } else {
    chibi.classList.add('idle');
    dot.classList.add('on');
    stxt.textContent = '대기 중';
  }
}

/* ── ROUTING ── */
function route(q) {
  const lower = q.toLowerCase();
  let best = EXPERTS[0]; let top = -1;
  EXPERTS.forEach(e => {
    const score = e.keywords.filter(k => lower.includes(k)).length;
    if (score > top) { top = score; best = e; }
  });
  return best;
}

/* ── CHAT ── */
function fill(txt) {
  document.getElementById('inp').value = txt;
  document.getElementById('inp').focus();
}

async function send() {
  if (busy) return;
  if (!apiKey) { toast('먼저 Claude API 키를 입력하고 연결 버튼을 눌러주세요'); return; }
  const inp = document.getElementById('inp');
  const q = inp.value.trim();
  if (!q) return;

  busy = true;
  inp.value = '';
  document.getElementById('sendbtn').disabled = true;

  addMsg('user', '나', q, '🙋', '#6366f1', false);

  const expert = route(q);

  // show router
  const router = document.getElementById('router');
  document.getElementById('routerName').textContent = expert.name;
  router.classList.add('show');
  setTimeout(() => router.classList.remove('show'), 2000);

  setState(expert.id, 'thinking');
  document.getElementById('card_' + expert.id).scrollIntoView({ behavior: 'smooth', block: 'nearest' });

  await delay(900);
  setState(expert.id, 'working');

  let answer = '';
  try {
    answer = await callClaude(q, expert);
  } catch(err) {
    answer = '⚠️ ' + (err.message || 'API 오류. 키를 확인해주세요.');
  }

  setState(expert.id, 'speaking');

  // show resp bubble on card with typewriter
  const resp = document.getElementById('resp_' + expert.id);
  resp.textContent = '';
  resp.classList.add('show');
  await typewrite(resp, answer, 18);

  addMsg('expert', `${expert.emoji} ${expert.name}`, answer, expert.emoji, expert.acc, true);

  setTimeout(() => {
    resp.classList.remove('show');
    setState(expert.id, 'idle');
  }, 10000);

  busy = false;
  document.getElementById('sendbtn').disabled = false;
}

function addMsg(type, name, text, icon, color, isExpert) {
  const log = document.getElementById('chatlog');
  const welcome = log.querySelector('div[style*="text-align"]');
  if (welcome) welcome.remove();
  const d = document.createElement('div');
  d.className = 'cmsg ' + (type === 'user' ? 'user' : '');
  d.innerHTML = `
    <div class="cav ${type === 'user' ? 'me' : ''}"
         style="${isExpert ? `background:${color}22;border:1px solid ${color}44;font-size:16px` : ''}">
      ${icon}
    </div>
    <div class="cbody">
      <div class="cwho">${name}</div>
      <div class="cbubble" style="${isExpert ? `border-color:${color}33` : ''}">
        ${text.replace(/\n/g, '<br>')}
      </div>
    </div>`;
  log.appendChild(d);
  log.scrollTop = log.scrollHeight;
}

/* ── TYPEWRITER ── */
async function typewrite(el, text, speed) {
  el.textContent = '';
  for (let i = 0; i < text.length; i++) {
    el.textContent += text[i];
    if (i % 4 === 0) await delay(speed);
  }
}

/* ── CLAUDE API ── */
async function callClaude(q, expert) {
  const prompt = `${expert.persona}

---
사용자 질문: "${q}"

위 전문가의 정체성으로 핵심 조언을 해주세요.
- 첫 문장에 핵심 결론
- 해당 전문가만의 프레임워크/공식 사용
- 구체적이고 즉시 실행 가능하게
- 서론·인사 없이 바로 답변
- 300자 이내`;

  const res = await fetch(
    'https://api.anthropic.com/v1/messages',
    {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-ipc': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 500,
        messages: [{ role: 'user', content: prompt }]
      })
    }
  );
  if (!res.ok) {
    const code = res.status;
    if (code === 429) throw new Error('API 한도 초과. 잠시 후 다시 시도하세요');
    if (code === 401 || code === 403) throw new Error('API 키를 확인하세요 (sk-ant-... 형식)');
    if (code === 400) throw new Error('요청 오류. 다시 시도해주세요');
    throw new Error(`API 오류 (${code})`);
  }
  const data = await res.json();
  return data?.content?.[0]?.text || '응답을 받지 못했습니다.';
}

  apiKey = v;
  localStorage.setItem('claude_key', v);
  toast('✅ Claude 연결 완료! 팀이 준비됐습니다');
}
function delay(ms) { return new Promise(r => setTimeout(r, ms)); }
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}
</script>
</body>
</html>
