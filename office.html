<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>억만장자 AI 가상 오피스</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#07080f;--surf:#0d0f18;--card:#11141f;--bdr:#191d32;--tx1:#eaecf8;--tx2:#5a6490;--tx3:#2a3060}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--tx1);min-height:100vh;overflow-x:hidden}

/* ── TOPBAR ── */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;
  background:rgba(7,8,15,.97);border-bottom:1px solid var(--bdr);
  position:sticky;top:0;z-index:300;backdrop-filter:blur(14px)}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{font-size:20px}
.logo-name{font-size:14px;font-weight:900}
.logo-sub{font-size:9.5px;color:var(--tx2)}
.live-badge{display:flex;align-items:center;gap:5px;background:rgba(16,185,129,.1);
  border:1px solid rgba(16,185,129,.25);border-radius:20px;padding:3px 10px;
  font-size:10px;font-weight:700;color:#10b981}
.live-dot{width:6px;height:6px;border-radius:50%;background:#10b981;animation:pulse 1.5s ease infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.api-wrap{display:flex;gap:6px}
.api-inp{background:var(--card);border:1px solid var(--bdr);border-radius:8px;
  padding:6px 10px;color:var(--tx1);font-size:11px;width:220px;outline:none}
.api-inp:focus{border-color:#f59e0b}
.api-btn{padding:6px 14px;background:#f59e0b;color:#000;border:none;border-radius:8px;
  font-size:11px;font-weight:700;cursor:pointer}
.api-btn:hover{background:#d97706}

/* ── OFFICE SCENE ── */
.scene{position:relative;width:100%;height:480px;overflow:hidden;
  background:linear-gradient(180deg,#060810 0%,#0a0d1a 52%,#0f1120 52%,#0f1120 100%)}

/* stars in background */
.star{position:absolute;border-radius:50%;background:#fff;
  animation:twinkle 3s ease-in-out infinite alternate}
@keyframes twinkle{0%{opacity:.1}100%{opacity:.8}}

/* wall windows */
.wall-win{position:absolute;top:24px;width:88px;height:68px;
  background:linear-gradient(180deg,#0d1c40 0%,#081228 100%);
  border:2.5px solid #1e2848;border-radius:5px;overflow:hidden}
.wall-win::before{content:'';position:absolute;left:50%;top:0;bottom:0;
  width:2px;background:#1e2848;transform:translateX(-50%)}
.wall-win::after{content:'';position:absolute;top:0;left:0;right:0;height:50%;
  border-bottom:2px solid #1e2848}
/* building silhouettes inside window */
.win-city{position:absolute;bottom:0;left:0;right:0;display:flex;align-items:flex-end;gap:1px;padding:0 3px}
.win-bld{background:#0a0d1e;flex:1}

/* wall sign */
.wall-sign{position:absolute;top:18px;left:50%;transform:translateX(-50%);
  white-space:nowrap;font-size:9px;font-weight:900;letter-spacing:2px;
  color:#f59e0b;text-shadow:0 0 12px rgba(245,158,11,.8);
  border:1px solid rgba(245,158,11,.3);border-radius:4px;padding:4px 12px;
  background:rgba(245,158,11,.06)}

/* clock */
.wall-clock{position:absolute;width:42px;height:42px;border-radius:50%;
  background:#0e1020;border:2.5px solid #1e2240;
  display:flex;align-items:center;justify-content:center}
.clock-face{position:relative;width:32px;height:32px}
.c-hand{position:absolute;bottom:50%;left:50%;transform-origin:bottom center;
  background:#f59e0b;border-radius:2px;margin-left:-1px}
.c-hr{width:2px;height:10px}
.c-min{width:1.5px;height:13px}
.c-dot{position:absolute;top:50%;left:50%;width:4px;height:4px;
  border-radius:50%;background:#f59e0b;transform:translate(-50%,-50%)}

/* baseboard */
.baseboard{position:absolute;top:52%;left:0;right:0;height:3px;
  background:linear-gradient(90deg,transparent,#252848,transparent)}

/* floor */
.floor{position:absolute;bottom:0;left:0;right:0;height:48%;
  background:repeating-linear-gradient(90deg,#0d0f1c 0px,#0d0f1c 79px,#10121f 80px,#10121f 159px)}
.floor::after{content:'';position:absolute;top:0;left:0;right:0;height:24px;
  background:linear-gradient(180deg,rgba(255,255,255,.025),transparent)}

/* desks row */
.desks-row{position:absolute;bottom:0;left:0;right:0;
  display:grid;grid-template-columns:repeat(4,1fr);align-items:flex-end;padding:0 16px;gap:6px}

/* single desk station */
.ds{display:flex;flex-direction:column;align-items:center;position:relative}

/* character upper-body area */
.char-stage{position:relative;z-index:5;margin-bottom:-2px}
.char-stage svg{display:block;overflow:visible}

/* desk furniture */
.desk-blk{width:100%;position:relative}
.desk-surface{
  height:16px;
  background:linear-gradient(180deg,#5c4222 0%,#3e2c14 100%);
  border-radius:3px 3px 0 0;border:1px solid #6e5030;border-bottom:none;
  position:relative;z-index:4;
  box-shadow:0 -3px 12px rgba(0,0,0,.5),inset 0 2px 3px rgba(255,255,255,.06)}
.desk-front{
  height:52px;
  background:linear-gradient(180deg,#2e1e0a 0%,#221608 100%);
  border:1px solid #3a2810;border-top:none;border-radius:0 0 3px 3px;
  position:relative;z-index:3;
  box-shadow:0 8px 24px rgba(0,0,0,.7)}
.desk-front-shine{position:absolute;top:0;left:10%;right:10%;height:2px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.04),transparent)}
.nameplate{
  position:absolute;bottom:8px;left:50%;transform:translateX(-50%);
  white-space:nowrap;font-size:7.5px;font-weight:700;letter-spacing:1px;
  color:var(--acc,#f59e0b);background:rgba(0,0,0,.5);
  border:1px solid rgba(var(--acc-rgb,245,158,11),.3);
  border-radius:3px;padding:2px 7px}

/* items on desk */
.desk-items{
  position:absolute;top:-58px;left:0;right:0;z-index:8;
  display:flex;align-items:flex-end;justify-content:space-around;padding:0 6px}
.d-monitor{
  width:50px;height:42px;
  background:#080910;border:1.5px solid #1a1e30;border-radius:5px 5px 2px 2px;
  position:relative;overflow:hidden;
  box-shadow:0 0 18px rgba(var(--acc-rgb,245,158,11),.18)}
.d-monitor::after{content:'';position:absolute;bottom:-7px;left:50%;transform:translateX(-50%);
  width:12px;height:7px;background:#141828;border-radius:0 0 3px 3px}
.d-screen{position:absolute;inset:3px;overflow:hidden;border-radius:2px}
.d-line{height:2.5px;margin-bottom:2.5px;border-radius:1px;width:0;
  animation:typeline 2.5s linear infinite}
@keyframes typeline{0%{width:0}55%{width:100%}100%{width:100%}}
.d-line:nth-child(2){animation-delay:.8s}
.d-line:nth-child(3){animation-delay:1.6s}
.d-coffee{font-size:14px;line-height:1;filter:drop-shadow(0 1px 3px rgba(0,0,0,.5))}
.d-book{
  width:18px;height:22px;background:var(--acc,#f59e0b);border-radius:1px;
  position:relative;transform:rotate(-8deg);
  box-shadow:-2px 2px 4px rgba(0,0,0,.4)}
.d-book::before{content:'';position:absolute;top:3px;left:2px;right:2px;
  height:1.5px;background:rgba(0,0,0,.3);border-radius:1px;box-shadow:0 4px 0 rgba(0,0,0,.2),0 8px 0 rgba(0,0,0,.2)}

/* THOUGHT BUBBLE */
.thought{
  display:none;position:absolute;top:-46px;left:50%;transform:translateX(-50%);
  background:#fff;color:#222;font-size:10px;font-weight:700;
  border-radius:14px;padding:5px 11px;white-space:nowrap;z-index:20;
  box-shadow:0 4px 16px rgba(0,0,0,.4)}
.thought::before{content:'•';position:absolute;bottom:-11px;left:calc(50% - 4px);font-size:11px;color:#fff}
.thought::after{content:'•';position:absolute;bottom:-18px;left:calc(50% - 2.5px);font-size:7px;color:#fff}
.thought.show{display:block;animation:fup .3s ease}
@keyframes fup{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* WALKER */
.walker{position:absolute;bottom:220px;z-index:15;pointer-events:none}
.walker svg{display:block;overflow:visible}

/* char animation states */
.char-anim{transform-origin:bottom center;display:inline-block}
.char-anim.idle{animation:caIdle 3.2s ease-in-out infinite}
@keyframes caIdle{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.char-anim.thinking{animation:caThink 1.3s ease-in-out infinite alternate}
@keyframes caThink{from{transform:rotate(-6deg)}to{transform:rotate(6deg) translateY(-4px)}}
.char-anim.working{animation:caWork .42s ease-in-out infinite alternate}
@keyframes caWork{from{transform:translateY(0) rotate(-1.5deg)}to{transform:translateY(-6px) rotate(1.5deg)}}
.char-anim.speaking{animation:caSpeak .32s ease-in-out infinite alternate}
@keyframes caSpeak{from{transform:scaleY(1)}to{transform:scaleY(1.05) translateY(-3px)}}
.char-anim.walking{animation:caWalk .48s ease-in-out infinite alternate}
@keyframes caWalk{from{transform:translateY(0) rotate(-2.5deg)}to{transform:translateY(-7px) rotate(2.5deg)}}

/* ── EXPERT GRID ── */
.grid-wrap{padding:10px 14px 0}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
@media(max-width:860px){.grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:460px){.grid{grid-template-columns:1fr 1fr}}

.ecard{
  background:var(--card);border:1.5px solid var(--bdr);border-radius:14px;
  padding:12px 10px;position:relative;overflow:hidden;
  transition:border-color .25s,box-shadow .25s;cursor:pointer}
.ecard::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--acc)}
.ecard.active{border-color:var(--acc);box-shadow:0 0 24px rgba(var(--acc-rgb),.22)}
.ecard:hover{border-color:rgba(var(--acc-rgb),.5)}

.card-char{display:flex;justify-content:center;margin-bottom:7px;height:96px;align-items:center;overflow:visible}
.card-char svg{display:block;overflow:visible}

.card-mon{background:#080910;border:1px solid #181c2e;border-radius:6px;
  padding:6px 8px;margin-bottom:7px;min-height:40px;overflow:hidden}
.card-mon-dots{display:flex;gap:3px;margin-bottom:4px}
.card-mon-dot{width:5px;height:5px;border-radius:50%}
.card-mon-line{font-size:8px;color:#6fde9a;font-family:monospace;line-height:1.7;
  white-space:nowrap;overflow:hidden;animation:typeline 2.5s linear infinite}
.card-mon-line:nth-child(2){animation-delay:.8s}
.card-mon-line:nth-child(3){animation-delay:1.6s}

.cname{font-size:11px;font-weight:900;text-align:center;margin-bottom:1px}
.crole{font-size:8px;color:var(--tx2);text-align:center;margin-bottom:5px}
.srow{display:flex;align-items:center;justify-content:center;gap:5px;margin-bottom:4px}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--tx3)}
.sdot.on{background:#10b981;box-shadow:0 0 5px #10b981}
.sdot.thinking{background:#f59e0b;animation:pulse .8s infinite}
.sdot.speaking{background:#3b82f6;animation:pulse .4s infinite}
.stxt{font-size:8.5px;color:var(--tx2)}
.act{font-size:8px;color:var(--tx3);text-align:center;min-height:22px;line-height:1.5;padding:0 2px}

.resp{display:none;margin-top:6px;background:rgba(var(--acc-rgb),.07);
  border:1px solid rgba(var(--acc-rgb),.28);border-radius:9px;
  padding:7px 9px;font-size:10px;line-height:1.7;max-height:110px;overflow-y:auto}
.resp.show{display:block;animation:fup .3s ease}
.tdots{display:none;gap:4px;justify-content:center;padding:5px 0}
.tdots.show{display:flex}
.td{width:6px;height:6px;border-radius:50%;background:var(--acc);animation:tb .7s ease infinite}
.td:nth-child(2){animation-delay:.15s}
.td:nth-child(3){animation-delay:.3s}
@keyframes tb{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}

/* ── BOARDROOM ── */
.boardroom{background:var(--surf);border-top:1px solid var(--bdr);padding:0 16px 24px}
.broom-ttl{display:flex;align-items:center;gap:8px;padding:12px 0 10px;
  font-size:9px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:1.5px}
.broom-ttl::before,.broom-ttl::after{content:'';flex:1;height:1px;background:var(--bdr)}
.chatlog{max-height:240px;overflow-y:auto;display:flex;flex-direction:column;gap:7px;margin-bottom:10px;padding-right:3px}
.chatlog::-webkit-scrollbar{width:2px}
.chatlog::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:2px}
.msg{display:flex;gap:8px;animation:fup .25s ease}
.msg.me{flex-direction:row-reverse}
.mav{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.mav.u{background:linear-gradient(135deg,#6366f1,#8b5cf6)}
.mbody{max-width:73%}
.mwho{font-size:8.5px;color:var(--tx2);font-weight:700;margin-bottom:2px}
.msg.me .mwho{text-align:right}
.mbubble{background:var(--card);border:1px solid var(--bdr);border-radius:10px;padding:8px 11px;font-size:11.5px;line-height:1.7}
.msg.me .mbubble{background:rgba(99,102,241,.12);border-color:rgba(99,102,241,.3)}
.qbtns{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:9px}
.qbtn{background:var(--card);border:1px solid var(--bdr);border-radius:20px;
  padding:4px 11px;font-size:9.5px;color:var(--tx2);cursor:pointer;transition:.15s}
.qbtn:hover{border-color:#f59e0b;color:#f59e0b}
.input-row{display:flex;gap:7px}
.cinp{flex:1;background:var(--card);border:1px solid var(--bdr);border-radius:12px;
  padding:10px 13px;color:var(--tx1);font-size:12.5px;outline:none;
  font-family:inherit;resize:none;min-height:46px;max-height:100px}
.cinp:focus{border-color:#f59e0b}
.cinp::placeholder{color:var(--tx3)}
.sbtn{padding:10px 16px;background:linear-gradient(135deg,#f59e0b,#ef4444);
  border:none;border-radius:12px;color:#000;font-weight:900;font-size:12px;
  cursor:pointer;white-space:nowrap;align-self:flex-end;transition:.2s}
.sbtn:hover{opacity:.85;transform:scale(1.02)}
.sbtn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.router{display:none;text-align:center;font-size:10px;color:var(--tx2);padding:6px;animation:fup .3s ease}
.router.show{display:block}
.router span{font-weight:700;color:#f59e0b}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  background:var(--card);border:1px solid var(--bdr);border-radius:10px;
  padding:9px 16px;font-size:11.5px;z-index:999;opacity:0;transition:opacity .3s;
  pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,.6)}
.toast.show{opacity:1}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">
    <div class="logo-icon">🏢</div>
    <div>
      <div class="logo-name">억만장자 AI 가상 오피스</div>
      <div class="logo-sub">Billion Dollar Board · 24H Active</div>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <div class="live-badge"><div class="live-dot"></div>LIVE</div>
    <div class="api-wrap">
      <input class="api-inp" id="apiKey" type="password" placeholder="Claude API 키 (sk-ant-...)">
      <button class="api-btn" onclick="saveKey()">연결</button>
    </div>
  </div>
</div>

<div class="scene" id="scene">
  <div id="sceneInner"></div>
  <div class="walker" id="walker"></div>
</div>

<div class="grid-wrap">
  <div class="grid" id="grid"></div>
</div>

<div class="boardroom">
  <div class="broom-ttl">팀 브리핑 룸</div>
  <div class="qbtns">
    <span class="qbtn" onclick="fill('내 가격 전략 어떻게 바꿔야 할까요?')">💰 가격</span>
    <span class="qbtn" onclick="fill('인스타 콘텐츠 전략 짜줘')">📱 콘텐츠</span>
    <span class="qbtn" onclick="fill('상담 후 계약이 안 됩니다. 클로징 방법')">🤝 클로징</span>
    <span class="qbtn" onclick="fill('포지셔닝과 브랜딩을 어떻게 잡아야 하나요')">🎯 브랜딩</span>
    <span class="qbtn" onclick="fill('퍼널 자동화 설계해줘')">🔄 퍼널</span>
    <span class="qbtn" onclick="fill('의욕이 떨어집니다. 다시 불 붙여줘요')">⚡ 마인드셋</span>
    <span class="qbtn" onclick="fill('광고 카피 5개 만들어줘')">📮 카피</span>
  </div>
  <div class="chatlog" id="chatlog">
    <div style="text-align:center;padding:28px 0;color:var(--tx3);font-size:12px">
      🏢 팀이 대기 중입니다. 비즈니스 고민을 던져보세요.
    </div>
  </div>
  <div class="router" id="router">→ <span id="rname"></span>에게 라우팅 중...</div>
  <div class="input-row">
    <textarea class="cinp" id="inp" placeholder="비즈니스 고민을 팀에게 던져보세요..." rows="1"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"></textarea>
    <button class="sbtn" id="sbtn" onclick="send()">팀에게 물어보기 →</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ── EXPERT DATA ── */

  {id:'cardone',name:'Grant Cardone',role:'10X 영업 & 볼륨',emoji:'🚀',
   acc:'#ef4444',rgb:'239,68,68',
   skin:'#F0A87A',skinD:'#C8784A',hair:'#3d2000',hairL:'#5a3800',
   body:'#cc2222',bodyL:'#dd3333',eye:'#804020',
   hairStyle:'slick',tie:true,wink:false,brows:'normal',mouth:'grin',
   prop:{e:'📱',x:54,y:52},
   mon:['> CALLS: 0/100','> FOLLOW-UP: 43','> PIPELINE $2.4M'],monC:'#ef4444',
   acts:['팔로업 시퀀스 최적화 중','10X 목표 재설정 중','이의처리 스크립트 작성 중','파이프라인 볼륨 분석 중'],
   persona:`당신은 Grant Cardone입니다. "Sell or Be Sold" 저자. 10X 법칙의 대가. 팔로업, 볼륨, 활동량 강조. 에너지 넘치고 직접적으로. 한국어로 300자 이내.`,
   kw:['영업','팔로업','콜드','파이프라인','볼륨','활동량','거절','클로징','목표','전화']},
  {id:'godin',name:'Seth Godin',role:'포지셔닝 & 브랜드',emoji:'🎯',
   acc:'#8b5cf6',rgb:'139,92,246',
   skin:'#EDA882',skinD:'#C07848',hair:'',hairL:'',

/* ── COLOR UTIL ── */
function shade(hex,n){
  if(!hex||hex.length<7)return hex||'#888888';
  const num=parseInt(hex.slice(1),16);
  const r=Math.min(255,Math.max(0,(num>>16)+n));
  const g=Math.min(255,Math.max(0,((num>>8)&0xff)+n));
  const b=Math.min(255,Math.max(0,(num&0xff)+n));
  return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');
}

<path d="M56.5,25.5 Q69,13 81.5,25.5" stroke="${e.hair||'#1a1a1a'}" stroke-width="3.4" fill="rgba(0,0,0,.22)" stroke-linecap="round"/>
<line x1="57.5" y1="27.5" x2="52.5" y2="20.5" stroke="${e.hair||'#1a1a1a'}" stroke-width="1.9" stroke-linecap="round"/>

<!-- EYEBROWS (drawn on top of eyelid arches) -->

<!-- CHEEKS -->
<ellipse cx="13" cy="45" rx="9" ry="6" fill="rgba(255,100,80,.2)"/>

/* ── STATE ── */
let apiKey = localStorage.getItem('claude_key')||'';
let busy = false;

/* ── INIT ── */
window.onload = () => {
  if(apiKey) document.getElementById('apiKey').value = apiKey;
  buildScene();
  buildCards();
  buildWalker();
  initClock();
  startRotation();
};

/* ── SCENE ── */
function buildScene(){
  const scene = document.getElementById('scene');
  const inner = document.getElementById('sceneInner');

  // Stars
  for(let i=0;i<60;i++){
    const s=document.createElement('div');
    s.className='star';
    s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*50}%;
      width:${Math.random()<.7?1:2}px;height:${Math.random()<.7?1:2}px;
      animation-delay:${(Math.random()*4).toFixed(1)}s;
      animation-duration:${(2+Math.random()*3).toFixed(1)}s`;
    scene.appendChild(s);
  }

  // Windows
  [30,scene.offsetWidth||900-140].forEach((left,i)=>{
    const w=document.createElement('div');
    w.className='wall-win';
    w.style.left=(!i?'32px':'calc(100% - 130px)');
    // city buildings inside
    const city=document.createElement('div');
    city.className='win-city';
    for(let b=0;b<8;b++){
      const bld=document.createElement('div');
      bld.className='win-bld';
      bld.style.height=(16+Math.random()*32)+'px';
      // random lit windows
      const lits=[];
      for(let r=0;r<3;r++) for(let c=0;c<3;c++) if(Math.random()>.5)
        lits.push(`<div style="position:absolute;width:3px;height:3px;background:#ffd060;left:${2+c*5}px;top:${r*5+2}px;opacity:${(.5+Math.random()*.5).toFixed(1)}"></div>`);
      bld.style.position='relative';
      bld.innerHTML=lits.join('');
      city.appendChild(bld);
    }
    w.appendChild(city);
    inner.appendChild(w);
  });

  // Sign + clock
  const sign=document.createElement('div');
  sign.className='wall-sign';
  sign.textContent='⚡ BILLION DOLLAR BOARD';
  inner.appendChild(sign);

  const clk=document.createElement('div');
  clk.className='wall-clock';
  clk.style.cssText='top:22px;left:calc(50% + 60px)';
  clk.innerHTML=`<div class="clock-face">
    <div class="c-hand c-hr" id="chr"></div>
    <div class="c-hand c-min" id="cmin"></div>
    <div class="c-dot"></div></div>`;
  inner.appendChild(clk);

  // Baseboard
  const bb=document.createElement('div');bb.className='baseboard';inner.appendChild(bb);
  // Floor
  const fl=document.createElement('div');fl.className='floor';inner.appendChild(fl);

  // Plants
  ['8px','calc(100% - 36px)'].forEach(l=>{
    const p=document.createElement('div');
    p.style.cssText=`position:absolute;bottom:48%;left:${l};font-size:28px;z-index:5;filter:drop-shadow(0 2px 6px rgba(0,0,0,.6))`;
    p.textContent='🪴';inner.appendChild(p);
  });

  // Desks row
  const row=document.createElement('div');
  row.className='desks-row';
  row.innerHTML = EX.slice(0,4).map(e=>{
    const lines=e.mon.map((l,i)=>`<div class="d-line" style="background:${e.monC};animation-delay:${i*.8}s"></div>`).join('');
    return `<div class="ds" style="--acc:${e.acc};--acc-rgb:${e.rgb}">
      <div style="position:relative">
        <div class="thought" id="sthought_${e.id}">💭 분석 중...</div>
        <div class="char-anim idle" id="schar_${e.id}">
          ${buildSVG(e,88,'_s')}
        </div>
      </div>
      <div class="desk-blk">
        <div class="desk-items">
          <div class="d-monitor" style="--acc-rgb:${e.rgb}">
            <div class="d-screen">${lines}</div>
          </div>
          <div class="d-coffee">☕</div>
          <div class="d-book" style="--acc:${e.acc}"></div>
        </div>
        <div class="desk-surface"></div>
        <div class="desk-front">
          <div class="desk-front-shine"></div>
          <div class="nameplate">${e.name.split(' ')[0].toUpperCase()}</div>
        </div>
      </div>
    </div>`;
  }).join('');
  inner.appendChild(row);
}

/* ── WALKER (Tony Robbins walks across) ── */
function buildWalker(){
  const w=document.getElementById('walker');
  const e=EX[7]; // Tony Robbins
  w.innerHTML=`<div class="char-anim walking">${buildSVG(e,140,'_w')}</div>`;
  w.style.cssText='position:absolute;bottom:0;z-index:20;pointer-events:none;animation:walkAcross 14s linear infinite';
  // Inject keyframes if not present
  if(!document.getElementById('walkKF')){
    const s=document.createElement('style');
    s.id='walkKF';
    s.textContent='@keyframes walkAcross{0%{left:-90px;transform:scaleX(1)}49.9%{transform:scaleX(1)}50%{left:calc(100% + 10px);transform:scaleX(-1)}99.9%{transform:scaleX(-1)}100%{left:-90px;transform:scaleX(1)}}';
    document.head.appendChild(s);
  }
}

/* ── CARDS ── */
function buildCards(){
  document.getElementById('grid').innerHTML=EX.map(e=>{
    const lines=e.mon.map((l,i)=>`<div class="card-mon-line" style="color:${e.monC};animation-delay:${i*.8}s">${l}</div>`).join('');
    return `<div class="ecard" id="card_${e.id}" style="--acc:${e.acc};--acc-rgb:${e.rgb}" onclick="spotlight('${e.id}')">
      <div class="card-char">
        <div class="char-anim idle" id="cchar_${e.id}">
          ${buildSVG(e,96,'_c')}
        </div>
      </div>
      <div class="card-mon">
        <div class="card-mon-dots">
          <div class="card-mon-dot" style="background:#ef4444"></div>
          <div class="card-mon-dot" style="background:#f59e0b"></div>
          <div class="card-mon-dot" style="background:#10b981"></div>
        </div>
        ${lines}
      </div>
      <div class="cname">${e.name}</div>
      <div class="crole">${e.role}</div>
      <div class="srow"><div class="sdot on" id="dot_${e.id}"></div><div class="stxt" id="stxt_${e.id}">대기 중</div></div>
      <div class="act" id="act_${e.id}">${e.acts[0]}</div>
      <div class="tdots" id="tdots_${e.id}">
        <div class="td" style="background:${e.acc}"></div>
        <div class="td" style="background:${e.acc}"></div>
        <div class="td" style="background:${e.acc}"></div>
      </div>
      <div class="resp" id="resp_${e.id}"></div>
    </div>`;
  }).join('');
}

/* ── CLOCK ── */
function initClock(){
  function tick(){
    const now=new Date();
    const h=now.getHours()%12,m=now.getMinutes(),s=now.getSeconds();
    const hr=document.getElementById('chr');
    const mn=document.getElementById('cmin');
    if(hr) hr.style.transform=`rotate(${h*30+m*.5}deg)`;
    if(mn) mn.style.transform=`rotate(${m*6+s*.1}deg)`;
  }
  tick();setInterval(tick,1000);
}

/* ── IDLE ROTATION ── */
function startRotation(){
  setInterval(()=>{
    EX.forEach(e=>{
      const c=document.getElementById('card_'+e.id);
      if(c&&!c.classList.contains('active')){
        const a=document.getElementById('act_'+e.id);
        if(a) a.textContent=e.acts[Math.floor(Math.random()*e.acts.length)];
      }
    });
  },3800);
  // Random micro-activity in scene
  setInterval(()=>{
    const e=EX[Math.floor(Math.random()*4)];
    const sc=document.getElementById('schar_'+e.id);
    if(sc&&sc.className.includes('idle')){
      sc.className='char-anim working';
      setTimeout(()=>{sc.className='char-anim idle'},1800);
    }
  },4200);
}

/* ── SPOTLIGHT ── */
function spotlight(id){
  const sc=document.getElementById('schar_'+id);
  if(sc){sc.style.transform='scale(1.18)';setTimeout(()=>{sc.style.transform=''},350);}
}

/* ── STATE ── */
function setState(id, state){
  const card=document.getElementById('card_'+id);
  const dot=document.getElementById('dot_'+id);
  const stxt=document.getElementById('stxt_'+id);
  const tdots=document.getElementById('tdots_'+id);
  const cc=document.getElementById('cchar_'+id);
  const sc=document.getElementById('schar_'+id);
  const st=document.getElementById('sthought_'+id);

  card.classList.remove('active');
  dot.className='sdot';
  tdots.classList.remove('show');
  if(cc) cc.className='char-anim';
  if(sc) sc.className='char-anim';
  if(st) st.classList.remove('show');

  if(state==='thinking'){
    card.classList.add('active');
    dot.classList.add('thinking');stxt.textContent='분석 중...';
    if(cc)cc.className='char-anim thinking';
    if(sc)sc.className='char-anim thinking';
    if(st)st.classList.add('show');
  }else if(state==='working'){
    card.classList.add('active');
    dot.classList.add('thinking');stxt.textContent='작성 중...';
    if(cc)cc.className='char-anim working';
    if(sc)sc.className='char-anim working';
    tdots.classList.add('show');
  }else if(state==='speaking'){
    card.classList.add('active');
    dot.classList.add('speaking');stxt.textContent='답변 중...';
    if(cc)cc.className='char-anim speaking';
    if(sc)sc.className='char-anim speaking';
  }else{
    dot.classList.add('on');stxt.textContent='대기 중';
    if(cc)cc.className='char-anim idle';
    if(sc)sc.className='char-anim idle';
  }
}

/* ── ROUTING ── */
function route(q){
  const lower=q.toLowerCase();
  let best=EX[0],top=-1;
  EX.forEach(e=>{
    const score=e.kw.filter(k=>lower.includes(k)).length;
    if(score>top){top=score;best=e;}
  });
  return best;
}

/* ── CHAT ── */
function fill(t){document.getElementById('inp').value=t;document.getElementById('inp').focus();}

async function send(){
  if(busy)return;
  if(!apiKey){toast('먼저 Claude API 키를 입력하고 연결 버튼을 눌러주세요');return;}
  const inp=document.getElementById('inp');
  const q=inp.value.trim();if(!q)return;
  busy=true;inp.value='';
  document.getElementById('sbtn').disabled=true;
  addMsg('user','나',q,'🙋','#6366f1',false);
  const expert=route(q);
  document.getElementById('rname').textContent=expert.name;
  const r=document.getElementById('router');
  r.classList.add('show');setTimeout(()=>r.classList.remove('show'),2000);
  setState(expert.id,'thinking');
  document.getElementById('card_'+expert.id).scrollIntoView({behavior:'smooth',block:'nearest'});
  await delay(900);
  setState(expert.id,'working');
  let answer='';
  try{answer=await callClaude(q,expert);}
  catch(err){answer='⚠️ '+(err.message||'API 오류. 키를 확인해주세요.');}
  setState(expert.id,'speaking');
  const resp=document.getElementById('resp_'+expert.id);
  resp.textContent='';resp.classList.add('show');
  await typewrite(resp,answer,18);
  addMsg('expert',`${expert.emoji} ${expert.name}`,answer,expert.emoji,expert.acc,true);
  setTimeout(()=>{resp.classList.remove('show');setState(expert.id,'idle');},10000);
  busy=false;document.getElementById('sbtn').disabled=false;
}

function addMsg(type,name,text,icon,color,isExpert){
  const log=document.getElementById('chatlog');
  const w=log.querySelector('div[style*="text-align"]');if(w)w.remove();
  const d=document.createElement('div');
  d.className='msg '+(type==='user'?'me':'');
  d.innerHTML=`<div class="mav ${type==='user'?'u':''}" style="${isExpert?`background:${color}20;border:1px solid ${color}40;font-size:15px`:''}">${icon}</div>
    <div class="mbody"><div class="mwho">${name}</div>
    <div class="mbubble" style="${isExpert?`border-color:${color}30`:''}">${text.replace(/\n/g,'<br>')}</div></div>`;
  log.appendChild(d);log.scrollTop=log.scrollHeight;
}

async function typewrite(el,text,speed){
  el.textContent='';
  for(let i=0;i<text.length;i++){el.textContent+=text[i];if(i%4===0)await delay(speed);}
}

/* ── CLAUDE API ── */
async function callClaude(q,expert){
  const prompt=`${expert.persona}\n\n---\n사용자 질문: "${q}"\n\n위 전문가의 정체성으로 핵심 조언을 해주세요.\n- 첫 문장에 핵심 결론\n- 해당 전문가만의 프레임워크/공식 사용\n- 구체적이고 즉시 실행 가능하게\n- 서론·인사 없이 바로 답변\n- 300자 이내`;
  const res=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-ipc':'true'},
    body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:500,messages:[{role:'user',content:prompt}]})
  });
  if(!res.ok){
    const c=res.status;
    if(c===429)throw new Error('API 한도 초과');
    if(c===401||c===403)throw new Error('API 키를 확인하세요 (sk-ant-... 형식)');
    throw new Error(`API 오류 (${c})`);
  }
  const data=await res.json();
  return data?.content?.[0]?.text||'응답을 받지 못했습니다.';
}

/* ── UTILS ── */
function saveKey(){
  const v=document.getElementById('apiKey').value.trim();
  if(!v){toast('API 키를 입력해주세요');return;}
  apiKey=v;localStorage.setItem('claude_key',v);
  toast('✅ Claude 연결 완료! 팀이 준비됐습니다');
}
function delay(ms){return new Promise(r=>setTimeout(r,ms));}
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}
