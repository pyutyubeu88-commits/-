<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AI 드림팀 운영실</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif;background:#f2f3f5;color:#1a1a2e;min-height:100vh}
.hdr{background:#fff;border-bottom:1px solid #e0e0e0;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.hdr-left .badge{font-size:10px;font-weight:700;color:#7c3aed;letter-spacing:1.5px;margin-bottom:4px}
.hdr-title{font-size:20px;font-weight:900;color:#1a1a2e}
.hdr-desc{font-size:12px;color:#777;margin-top:3px}
.hdr-btns{display:flex;gap:8px}
.btn{padding:8px 15px;border-radius:7px;border:none;cursor:pointer;font-size:12px;font-weight:700;font-family:inherit;transition:.2s}
.btn-pause{background:#1a1a2e;color:#fff}.btn-pause:hover{background:#2d2d4e}
.btn-event{background:#7c3aed;color:#fff}.btn-event:hover{background:#6d28d9}
.btn-reset{background:#f0f0f0;color:#555}.btn-reset:hover{background:#e0e0e0}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:0;border-bottom:1px solid #e0e0e0;background:#fff}
.stat-card{padding:14px 22px;border-right:1px solid #e8e8e8}.stat-card:last-child{border-right:none}
.stat-label{font-size:11px;color:#999;margin-bottom:5px;letter-spacing:.5px}
.stat-val{font-size:30px;font-weight:900;color:#1a1a2e;line-height:1}
.main{display:grid;grid-template-columns:260px 1fr 210px;gap:14px;padding:14px 20px}
.panel{background:#fff;border-radius:10px;border:1px solid #e8e8e8}
.panel-hdr{padding:12px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #f0f0f0}
.panel-title{font-size:12px;font-weight:700;color:#1a1a2e}
.panel-badge{font-size:9px;font-weight:700;color:#7c3aed;background:#f0ebff;padding:2px 7px;border-radius:4px;letter-spacing:.5px}
.cmd-body{padding:12px}
.cmd-textarea{width:100%;height:90px;border:1px solid #e0e0e0;border-radius:7px;padding:9px;font-size:12px;font-family:inherit;resize:none;background:#fafafa;outline:none;color:#333}
.cmd-textarea:focus{border-color:#7c3aed}
.cmd-btn{width:100%;padding:9px;background:#7c3aed;color:#fff;border:none;border-radius:7px;font-size:13px;font-weight:700;cursor:pointer;margin-top:8px;font-family:inherit;transition:.2s}
.cmd-btn:hover{background:#6d28d9}.cmd-btn:disabled{background:#b0b0c8;cursor:not-allowed}
.speed-row{display:flex;gap:6px;margin-top:10px}
.sp-btn{flex:1;padding:6px;border:1px solid #e0e0e0;border-radius:5px;background:#fff;font-size:12px;font-weight:600;cursor:pointer;color:#555;font-family:inherit;transition:.15s}
.sp-btn.on{background:#1a1a2e;color:#fff;border-color:#1a1a2e}
.live-box{margin-top:12px}
.live-lbl{font-size:10px;font-weight:700;color:#aaa;letter-spacing:.5px;margin-bottom:6px}
.live-txt{font-size:11px;color:#444;line-height:1.7;background:#f8f8f8;border-radius:7px;padding:9px;min-height:60px}
.cvs-panel{background:#fff;border-radius:10px;border:1px solid #e8e8e8;overflow:hidden;display:flex;flex-direction:column}
.cvs-hdr-row{padding:11px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #f0f0f0;flex-shrink:0}
.live-badge{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:700;color:#ef4444}
.live-dot{width:6px;height:6px;border-radius:50%;background:#ef4444;animation:blink 1.4s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
canvas{display:block;width:100%;flex:1}
.status-body{padding:10px 12px}
.char-row{display:flex;align-items:center;gap:9px;padding:8px 0;border-bottom:1px solid #f5f5f5}
.char-row:last-child{border-bottom:none}
.c-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.c-info{flex:1;min-width:0}
.c-name{font-size:11px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.c-task{font-size:10px;color:#999;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.c-st{font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;white-space:nowrap}
.st-idle{color:#6366f1;background:#eef2ff}.st-walk{color:#f59e0b;background:#fef3c7}.st-work{color:#10b981;background:#d1fae5}
.log-wrap{padding:0 20px 20px}
.log-row-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.log-title{font-size:12px;font-weight:700}.log-sub{font-size:10px;color:#aaa;cursor:pointer}
.log-list{display:flex;flex-direction:column;gap:6px;max-height:180px;overflow-y:auto}
.log-list::-webkit-scrollbar{width:4px}.log-list::-webkit-scrollbar-thumb{background:#e0e0e0;border-radius:2px}
.log-item{background:#fff;border-radius:7px;padding:10px 14px;border:1px solid #e8e8e8;display:flex;gap:14px;align-items:flex-start}
.log-id{font-size:11px;font-weight:700;color:#7c3aed;white-space:nowrap;font-family:monospace}
.log-right{flex:1}.log-text{font-size:12px;color:#333;font-weight:500}.log-meta{font-size:10px;color:#aaa;margin-top:2px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(16px);background:#1a1a2e;color:#fff;padding:9px 18px;border-radius:7px;font-size:12px;font-weight:600;opacity:0;transition:.25s;z-index:9999;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<header class="hdr">
  <div class="hdr-left">
    <div class="badge">AI-ONLY STAFF OFFICE</div>
    <h1 class="hdr-title">AI 드림팀 운영실</h1>
    <p class="hdr-desc">8명의 AI 전문가들이 전략·콘텐츠·세일즈·운영 업무를 나눠 처리합니다.</p>
  </div>
  <div class="hdr-btns">
    <button class="btn btn-pause" id="pauseBtn" onclick="togglePause()">운영 일시정지</button>
    <button class="btn btn-event" onclick="triggerRare()">희귀 이벤트 추가</button>
    <button class="btn btn-reset" onclick="resetAll()">초기화</button>
  </div>
</header>
<div class="stats">
  <div class="stat-card"><div class="stat-label">완료 업무</div><div class="stat-val" id="stQuest">0</div></div>
  <div class="stat-card"><div class="stat-label">성과 코인</div><div class="stat-val" id="stCoin">0</div></div>
  <div class="stat-card"><div class="stat-label">API 토큰</div><div class="stat-val" id="stToken">0</div></div>
  <div class="stat-card"><div class="stat-label">희귀 이벤트</div><div class="stat-val" id="stRare">0</div></div>
</div>
<div class="main">
  <div class="panel">
    <div class="panel-hdr"><span class="panel-title">업무 지시</span><span class="panel-badge">AI Command</span></div>
    <div class="cmd-body">
      <textarea class="cmd-textarea" id="cmdInput" placeholder="AI 드림팀에게 업무를 지시하세요&#10;&#10;예) SNS 마케팅 전략을 세워줘"></textarea>
      <button class="cmd-btn" id="cmdBtn" onclick="sendCommand()">드림팀에게 지시</button>
      <div class="speed-row">
        <button class="sp-btn" onclick="setSpeed(0.5,this)">0.5x</button>
        <button class="sp-btn on" onclick="setSpeed(1,this)">1x</button>
        <button class="sp-btn" onclick="setSpeed(2,this)">2x</button>
      </div>
      <div class="live-box">
        <div class="live-lbl">라이브 멘트</div>
        <div class="live-txt" id="liveTxt">드림팀이 대기 중입니다. 업무를 지시하거나 시뮬레이션을 관찰하세요.</div>
      </div>
    </div>
  </div>
  <div class="cvs-panel">
    <div class="cvs-hdr-row"><span class="panel-title">4층 AI 오피스</span><div class="live-badge"><div class="live-dot"></div>Live Simulation</div></div>
    <canvas id="cvs"></canvas>
  </div>
  <div class="panel">
    <div class="panel-hdr"><span class="panel-title">직원 상태</span><span class="panel-badge">Readable</span></div>
    <div class="status-body" id="charList"></div>
  </div>
</div>
<div class="log-wrap">
  <div class="log-row-hdr"><div class="log-title">업무 큐 · AI 이벤트 로그</div><div class="log-sub">실시간 업데이트</div></div>
  <div class="log-list" id="logList"></div>
</div>
<div class="toast" id="toast"></div>
<script>

}
function drawChar(c){const{x,y,col,name,st}=c;ctx.fillStyle='rgba(0,0,0,0.25)';ctx.beginPath();ctx.ellipse(x,y+14,7,3,0,0,Math.PI*2);ctx.fill();const lw=st==='walk'?Math.sin(tick*0.15)*3:0;r(x-5,y+8,5,10+lw,'#2a2a2a');r(x+1,y+8,5,10-lw,'#333');r(x-6,y-4,12,13,col);ctx.fillStyle='#e8a87c';ctx.beginPath();ctx.arc(x,y-9,7,0,Math.PI*2);ctx.fill();ctx.fillStyle=col;ctx.beginPath();ctx.arc(x,y-12,7,Math.PI,0);ctx.fill();r(x-7,y-16,14,6,col);r(x-4,y-11,3,3,'#fff');r(x+1,y-11,3,3,'#fff');r(x-3,y-10,2,2,'#1a1a1a');r(x+2,y-10,2,2,'#1a1a1a');ctx.font='bold 7px monospace';const tw=ctx.measureText(name).width;ctx.fillStyle='rgba(0,0,0,.75)';ctx.fillRect(x-tw/2-3,y-28,tw+6,11);ctx.fillStyle='#fff';ctx.textAlign='center';ctx.fillText(name,x,y-20);}
function draw(){FL.forEach(f=>{r(0,f.y,LW,f.h,f.bg);ctx.strokeStyle=f.line;ctx.lineWidth=.5;ctx.beginPath();ctx.moveTo(0,f.y);ctx.lineTo(LW,f.y);ctx.stroke();ctx.strokeStyle='rgba(255,255,255,0.03)';ctx.lineWidth=1;for(let gx=0;gx<LW;gx+=20){ctx.beginPath();ctx.moveTo(gx,f.y);ctx.lineTo(gx,f.y+f.h);ctx.stroke();}});FL.forEach(f=>{const sy=f.y+f.h;if(sy>=LH)return;for(let i=0;i<6;i++){r(0,sy-3+i*.5,LW,1,`rgba(${i<3?'100,60,20':'60,40,20'},${.8-i*.15})`);}}); r(0,LH-20,LW,20,'#0a0a0a');ctx.fillStyle='#00ff41';ctx.font='bold 10px monospace';ctx.textAlign='left';ctx.fillText('QUEST '+quest,12,LH-7);ctx.fillStyle='#ffd700';ctx.textAlign='center';ctx.fillText('COIN '+coins,LW/2,LH-7);ctx.fillStyle='#0af';ctx.textAlign='right';ctx.fillText('TOKEN '+tokens,LW-12,LH-7);drawFurniture();CHARS.forEach(drawChar);}
function pickTarget(c){const p=WP[c.fi][Math.floor(Math.random()*WP[c.fi].length)];c.tx=p.x;c.ty=p.y;c.st='walk';}
function update(dt){tick++;CHARS.forEach(c=>{if(paused)return;if(c.st==='idle'){c.wt-=dt*spd;if(c.wt<=0)pickTarget(c);}else if(c.st==='walk'){const dx=c.tx-c.x,dy=c.ty-c.y,dist=Math.sqrt(dx*dx+dy*dy);if(dist<2){c.x=c.tx;c.y=c.ty;c.st='work';c.wt=2000+Math.random()*4000;quest++;coins+=15+Math.floor(Math.random()*20);tokens+=Math.floor(Math.random()*80+20);addLog(c.name,TASKS[c.fi][Math.floor(Math.random()*TASKS[c.fi].length)],c.col);updateStats();updateStatus();}else{const mv=Math.min(60*spd*dt/1000,dist);c.x+=dx/dist*mv;c.y+=dy/dist*mv;}}else if(c.st==='work'){c.wt-=dt*spd;if(c.wt<=0){c.st='idle';c.wt=800+Math.random()*1200;}}});}
function updateStats(){document.getElementById('stQuest').textContent=quest;document.getElementById('stCoin').textContent=coins;document.getElementById('stToken').textContent=tokens;document.getElementById('stRare').textContent=rare;}
function updateStatus(){const stM={idle:'대기',walk:'이동',work:'작업'},clM={idle:'st-idle',walk:'st-walk',work:'st-work'};document.getElementById('charList').innerHTML=CHARS.map(c=>`<div class="char-row"><div class="c-dot" style="background:${c.col}"></div><div class="c-info"><div class="c-name">${c.name}·${c.role}</div><div class="c-task">${FL[c.fi].name}</div></div><span class="c-st ${clM[c.st]}">${stM[c.st]}</span></div>`).join('');}
function addLog(name,task,col){const id='CX-'+String(logIdx++).padStart(4,'0');const n=new Date(),h=n.getHours(),m=n.getMinutes(),s=n.getSeconds();const time=`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;const list=document.getElementById('logList');const item=document.createElement('div');item.className='log-item';item.innerHTML=`<div class="log-id">${id}</div><div class="log-right"><div class="log-text"><span style="color:${col};font-weight:700">${name}</span> → ${task} 완료</div><div class="log-meta">${time} · 코인 +${15+Math.floor(Math.random()*20)}</div></div>`;list.insertBefore(item,list.firstChild);if(list.children.length>30)list.removeChild(list.lastChild);}
function togglePause(){paused=!paused;document.getElementById('pauseBtn').textContent=paused?'운영 재개':'운영 일시정지';toast(paused?'⏸ 일시정지':'▶ 재개');}
function setSpeed(s,btn){spd=s;document.querySelectorAll('.sp-btn').forEach(b=>b.classList.remove('on'));btn.classList.add('on');}
function resetAll(){quest=0;coins=0;tokens=0;rare=0;logIdx=1;CHARS.forEach(c=>{c.st='idle';c.wt=Math.random()*2000;});document.getElementById('logList').innerHTML='';updateStats();updateStatus();toast('초기화 완료');}
function triggerRare(){rare++;const n=['메가 세일즈 폭발','퍼플카우 발견','10X 모멘텀','바이럴 폭발','골든 클로즈'][Math.floor(Math.random()*5)];coins+=500+Math.floor(Math.random()*500);quest+=5;updateStats();addLog('드림팀','[희귀] '+n,'#ffd700');setLive('🚀 희귀 이벤트: '+n+'! 전원 긴급 대응 돌입.');toast('⭐ '+n);}
function setLive(t){document.getElementById('liveTxt').textContent=t;}
async function sendCommand(){const inp=document.getElementById('cmdInput'),q=inp.value.trim();if(!q){toast('업무 지시를 입력해주세요');return;}const btn=document.getElementById('cmdBtn');btn.disabled=true;btn.textContent='AI 팀 분석 중...';setLive('드림팀이 지시를 검토하고 있습니다...');try{const res=await fetch('/api/claude',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:300,system:'당신은 8명의 AI 비즈니스 전문가 팀(Hormozi·오퍼설계, Godin·포지셔닝, Gary Vee·콘텐츠, Brunson·퍼널, Belfort·세일즈, Kennedy·카피, Cardone·10X운영, Robbins·에너지)의 팀 리더입니다. 사용자가 업무를 지시하면 팀이 어떻게 분담하여 처리할지 활기차고 구체적으로 2-3문장으로 한국어로 답하세요.',messages:[{role:'user',content:q}]})});const d=await res.json(),ans=d?.content?.[0]?.text||'응답 없음';setLive(ans);tokens+=(d?.usage?.input_tokens||0)+(d?.usage?.output_tokens||0);quest+=3;coins+=100;updateStats();addLog('Claude','업무 분석: '+q.slice(0,25)+(q.length>25?'...':''),'#7c3aed');CHARS.forEach(c=>{c.st='idle';c.wt=Math.random()*500;});inp.value='';}catch(e){setLive('⚠️ 오류: '+e.message);toast('오류: '+e.message);}finally{btn.disabled=false;btn.textContent='드림팀에게 지시';}}
document.getElementById('cmdInput').addEventListener('keydown',e=>{if(e.key==='Enter'&&e.ctrlKey)sendCommand();});
const AMB=['오퍼 가치 방정식 최적화','퍼플카우 포지셔닝 재설계','콘텐츠 캘린더 수립','가치 사다리 단계 검토','클로징 스크립트 업데이트','세일즈 레터 초안 완료','10X 목표 재설정','피크 퍼포먼스 루틴 점검','SNS 알고리즘 분석','고객 아바타 정의','퍼널 전환율 분석','자동화 워크플로우 설정'];
let ambI=0;setInterval(()=>{if(!paused){const c=CHARS[Math.floor(Math.random()*CHARS.length)];addLog(c.name,AMB[ambI%AMB.length],c.col);quest++;coins+=10;updateStats();updateStatus();ambI++;}},5000);
function loop(ts){const dt=Math.min(ts-lastTs,100);lastTs=ts;if(!paused)update(dt);ctx.clearRect(0,0,LW,LH);draw();requestAnimationFrame(loop);}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2500);}
CHARS.forEach(c=>{c.wt=Math.random()*3000;});updateStats();updateStatus();requestAnimationFrame(loop);
</script>
</body>
