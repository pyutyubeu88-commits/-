<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>억만장자 AI 가상 오피스</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0b10;--surface:#10121a;--card:#161924;--bdr:#1e2235;
  --tx1:#eef0fa;--tx2:#7880a0;--tx3:#3a4060;
  --floor:#1a1c2a;--wall:#0f1018;--desk:#2a1f14;--desk-top:#3a2a18;
}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--tx1);min-height:100vh;overflow-x:hidden}

/* ──────── TOPBAR ──────── */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;
  background:rgba(10,11,16,.97);border-bottom:1px solid var(--bdr);
  position:sticky;top:0;z-index:200;backdrop-filter:blur(12px)}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{font-size:20px}
.logo-name{font-size:14px;font-weight:900;letter-spacing:-.3px}
.logo-sub{font-size:10px;color:var(--tx2)}
.live{display:flex;align-items:center;gap:5px;background:rgba(16,185,129,.1);
  border:1px solid rgba(16,185,129,.25);border-radius:20px;padding:3px 10px;
  font-size:10px;font-weight:700;color:#10b981}
.live-dot{width:6px;height:6px;border-radius:50%;background:#10b981;animation:livepulse 1.5s ease infinite}
@keyframes livepulse{0%,100%{opacity:1}50%{opacity:.3}}
.api-wrap{display:flex;gap:6px}
.api-inp{background:var(--card);border:1px solid var(--bdr);border-radius:8px;
  padding:6px 10px;color:var(--tx1);font-size:11px;width:220px;outline:none}
.api-inp:focus{border-color:#f59e0b}
.api-btn{padding:6px 14px;background:#f59e0b;color:#000;border:none;border-radius:8px;
  font-size:11px;font-weight:700;cursor:pointer;transition:.15s}
.api-btn:hover{background:#d97706}

/* ──────── OFFICE SCENE ──────── */
.office-scene{
  position:relative;width:100%;height:420px;overflow:hidden;
  background:linear-gradient(180deg,#0c0e18 0%,#10121e 55%,#1a1c2e 55%,#1a1c2e 100%);
}

/* Back wall details */
.wall-decor{position:absolute;top:0;left:0;right:0;height:55%;pointer-events:none}
.wall-window{
  position:absolute;top:18px;width:90px;height:65px;
  background:linear-gradient(180deg,#1a2a4a 0%,#0d1a33 100%);
  border:3px solid #2a3050;border-radius:4px;
}
.wall-window::before{content:'';position:absolute;inset:4px;
  background:linear-gradient(135deg,rgba(100,160,255,.15) 0%,transparent 60%)}
.wall-window::after{content:'';position:absolute;left:50%;top:0;bottom:0;
  width:2px;background:#2a3050;transform:translateX(-50%)}
.ww-stars{position:absolute;inset:0;overflow:hidden}
.ww-star{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;
  animation:twinkle 2s ease-in-out infinite alternate}
@keyframes twinkle{0%{opacity:.2}100%{opacity:.9}}
.wall-clock{
  position:absolute;top:22px;left:50%;transform:translateX(-50%);
  width:44px;height:44px;border-radius:50%;
  background:#181c28;border:3px solid #2a2d42;
}
.clock-hand{position:absolute;bottom:50%;left:50%;transform-origin:bottom center;
  background:#f59e0b;border-radius:2px}
.ch-min{width:2px;height:14px;margin-left:-1px;animation:spin60 3600s linear infinite}
.ch-hr{width:2px;height:10px;margin-left:-1px;animation:spin60 43200s linear infinite}
@keyframes spin60{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.clock-dot{position:absolute;top:50%;left:50%;width:4px;height:4px;
  border-radius:50%;background:#f59e0b;transform:translate(-50%,-50%)}
.wall-sign{
  position:absolute;top:14px;right:80px;
  background:linear-gradient(135deg,#f59e0b22,#ef444422);
  border:1px solid #f59e0b44;border-radius:6px;
  padding:5px 12px;font-size:9px;font-weight:700;
  color:#f59e0b;letter-spacing:1px;
}
.wall-plant{position:absolute;bottom:0;font-size:28px;filter:drop-shadow(0 2px 4px #000)}

/* Floor */
.office-floor{
  position:absolute;bottom:0;left:0;right:0;height:45%;
  background:repeating-linear-gradient(
    90deg,
    #16192a 0px, #16192a 59px,
    #1a1d2e 60px, #1a1d2e 119px
  );
  border-top:2px solid #252840;
}
/* Floor shine */
.office-floor::after{
  content:'';position:absolute;top:0;left:0;right:0;height:30px;
  background:linear-gradient(180deg,rgba(255,255,255,.04) 0%,transparent 100%);
}

/* ──────── DESK SCENE ──────── */
.desks-row{
  position:absolute;bottom:0;left:0;right:0;height:100%;
  display:grid;grid-template-columns:repeat(4,1fr);
  align-items:flex-end;padding:0 12px;gap:4px;
}

/* Individual desk station */
.desk-station{
  position:relative;display:flex;flex-direction:column;align-items:center;
  height:100%;justify-content:flex-end;
}

/* Desk furniture */
.desk-furniture{
  position:relative;width:130px;margin-bottom:0;
}
.desk-surface{
  width:130px;height:16px;
  background:linear-gradient(180deg,#4a3520 0%,#3a2818 100%);
  border-radius:4px 4px 0 0;border:1px solid #5a4030;
  position:relative;z-index:3;
}
.desk-surface::before{content:'';position:absolute;top:0;left:5px;right:5px;height:4px;
  background:rgba(255,255,255,.06);border-radius:2px}
.desk-body{
  width:116px;height:52px;
  background:linear-gradient(180deg,#352515 0%,#2a1e10 100%);
  border:1px solid #4a3520;border-radius:2px;
  margin:0 auto;position:relative;z-index:2;
}
.desk-legs{display:flex;justify-content:space-between;padding:0 8px;position:relative;z-index:1}
.desk-leg{width:8px;height:28px;background:#251a0a;border-radius:0 0 3px 3px}

/* Items on desk */
.desk-items{
  position:absolute;top:-2px;left:0;right:0;
  display:flex;align-items:flex-end;justify-content:space-around;padding:0 8px;z-index:5;
}
.desk-monitor{
  width:48px;height:38px;
  background:#0a0c14;border:2px solid #1e2235;border-radius:5px 5px 2px 2px;
  position:relative;overflow:hidden;
}
.desk-monitor::after{content:'';position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);
  width:14px;height:8px;background:#1e2235;border-radius:0 0 3px 3px}
.desk-monitor-screen{position:absolute;inset:3px;overflow:hidden;border-radius:2px}
.desk-monitor-line{
  height:3px;margin-bottom:2px;border-radius:1px;
  background:rgba(111,222,154,.7);
  animation:monscroll 2.5s linear infinite;
  width:0;
}
@keyframes monscroll{0%{width:0}60%{width:100%}100%{width:100%}}
.desk-monitor-line:nth-child(2){animation-delay:.8s;background:rgba(100,160,255,.6)}
.desk-monitor-line:nth-child(3){animation-delay:1.6s;background:rgba(249,115,22,.5)}
.desk-coffee{font-size:13px;line-height:1}
.desk-paper{
  width:22px;height:16px;
  background:#f5f0e8;border-radius:1px;
  transform:rotate(-8deg);position:relative;
}
.desk-paper::before,.desk-paper::after{
  content:'';position:absolute;left:3px;right:3px;height:1.5px;
  background:#ccc;border-radius:1px;
}
.desk-paper::before{top:4px}
.desk-paper::after{top:8px}

/* ──────── CHIBI CHARACTERS (精密버전) ──────── */
.chibi-container{
  position:absolute;z-index:10;
  display:flex;flex-direction:column;align-items:center;
}

/* Sitting position - above desk */
.chibi-container.sitting{
  bottom:96px; /* sits above desk surface */
}

/* Chibi body system */
.chibi-root{
  position:relative;width:72px;height:108px;
  transform-origin:bottom center;
}

/* ── ANIMATIONS ── */
.chibi-root.idle{animation:idle-breathe 3s ease-in-out infinite}
@keyframes idle-breathe{0%,100%{transform:translateY(0) scaleY(1)}50%{transform:translateY(-3px) scaleY(1.01)}}

.chibi-root.thinking{animation:think-rock 1.2s ease-in-out infinite alternate}
@keyframes think-rock{from{transform:rotate(-5deg) translateY(0)}to{transform:rotate(5deg) translateY(-4px)}}

.chibi-root.working{animation:work-type .45s ease-in-out infinite alternate}
@keyframes work-type{from{transform:translateY(0)}to{transform:translateY(-5px)}}

.chibi-root.speaking{animation:speak-bounce .3s ease-in-out infinite alternate}
@keyframes speak-bounce{from{transform:scaleY(1) translateY(0)}to{transform:scaleY(1.05) translateY(-3px)}}

.chibi-root.walking{animation:walk-body .5s ease-in-out infinite alternate}
@keyframes walk-body{from{transform:translateY(0) rotate(-1deg)}to{transform:translateY(-6px) rotate(1deg)}}

/* SHADOW under chibi */
.chibi-shadow{
  width:50px;height:8px;
  background:radial-gradient(ellipse,rgba(0,0,0,.5) 0%,transparent 70%);
  margin-top:-2px;
}

/* HEAD — big chibi head */
.ch2-head{
  width:58px;height:60px;border-radius:50%;
  background:var(--skin,#F5B98A);
  position:absolute;top:0;left:7px;
  box-shadow:inset -4px -3px 0 rgba(0,0,0,.12);
}

/* CHEEKS (blush) */
.ch2-cheek{
  position:absolute;width:12px;height:7px;
  background:rgba(255,140,120,.35);border-radius:50%;
  top:32px;
}
.ch2-cheek.l{left:5px}
.ch2-cheek.r{right:5px}

/* HAIR — various styles on top of head */
.ch2-hair{position:absolute;top:0;left:7px;width:58px;pointer-events:none}
.ch2-hair-base{
  position:absolute;top:0;width:58px;height:0;
  background:var(--hair,#1a1a1a);border-radius:50% 50% 0 0;
}
/* buzzcut */
.hair-buzzcut .ch2-hair-base{height:20px}
/* slick back */
.hair-slick .ch2-hair-base{height:22px;border-radius:40% 40% 0 0}
.hair-slick .ch2-hair-base::after{
  content:'';position:absolute;right:-5px;top:10px;width:14px;height:10px;
  background:var(--hair,#3d2b1a);border-radius:0 8px 8px 0;
}
/* bald */
.hair-bald .ch2-hair-base{display:none}
/* messy spiky */
.hair-messy .ch2-hair-base{height:20px;border-radius:28px 28px 0 0}
.hair-messy .ch2-hair-base::before{
  content:'';position:absolute;top:-8px;left:6px;width:14px;height:14px;
  background:var(--hair,#1a1a1a);border-radius:50%;transform:rotate(-15deg);
}
.hair-messy .ch2-hair-base::after{
  content:'';position:absolute;top:-10px;right:8px;width:12px;height:15px;
  background:var(--hair,#1a1a1a);border-radius:50%;transform:rotate(20deg);
}
/* styled side-part */
.hair-styled .ch2-hair-base{height:24px;border-radius:32px 32px 0 0}
.hair-styled .ch2-hair-base::before{
  content:'';position:absolute;top:6px;left:-3px;width:10px;height:18px;
  background:var(--hair,#3d2b1a);border-radius:8px 0 0 8px;
}
/* wavy */
.hair-wavy .ch2-hair-base{height:20px;border-radius:28px 28px 0 0}
.hair-wavy .ch2-hair-base::before{
  content:'';position:absolute;bottom:-5px;left:0px;width:13px;height:9px;
  background:var(--hair,#5a3e28);border-radius:0 0 8px 8px;
}
.hair-wavy .ch2-hair-base::after{
  content:'';position:absolute;bottom:-5px;right:0px;width:13px;height:9px;
  background:var(--hair,#5a3e28);border-radius:0 0 8px 8px;
}
/* silver / white */
.hair-silver .ch2-hair-base{height:20px;background:#c8c8d8;border-radius:28px 28px 0 0}
/* tall pompadour */
.hair-tall .ch2-hair-base{height:28px;border-radius:28px 28px 2px 2px}
.hair-tall .ch2-hair-base::before{
  content:'';position:absolute;top:-6px;left:8px;right:8px;height:14px;
  background:var(--hair,#1a1a1a);border-radius:20px 20px 4px 4px;
}

/* EYES — large chibi eyes */
.ch2-eyes{position:absolute;top:21px;left:7px;width:58px;display:flex;justify-content:space-between;padding:0 8px}
.ch2-eye{
  width:16px;height:18px;background:#fff;border-radius:50%;
  position:relative;overflow:visible;
  animation:blink2 4s ease-in-out infinite;
}
@keyframes blink2{0%,88%,100%{transform:scaleY(1)}93%{transform:scaleY(.05)}}
.ch2-eye.r{animation-delay:.12s}
.ch2-pupil{
  width:10px;height:12px;border-radius:50%;
  background:radial-gradient(circle at 35% 30%,#5a3a8a,#1a0a30);
  position:absolute;top:2px;left:3px;
}
.ch2-shine1{width:4px;height:4px;background:#fff;border-radius:50%;
  position:absolute;top:2px;right:1px}
.ch2-shine2{width:2px;height:2px;background:rgba(255,255,255,.7);border-radius:50%;
  position:absolute;bottom:3px;left:2px}

/* Wink eye override */
.ch2-eye.wink{height:5px;background:#2d1b4e;border-radius:8px;overflow:hidden;top:28px}
.ch2-eye.wink .ch2-pupil,.ch2-eye.wink .ch2-shine1,.ch2-eye.wink .ch2-shine2{display:none}

/* EYEBROWS */
.ch2-brows{position:absolute;top:14px;left:7px;width:58px;display:flex;justify-content:space-between;padding:0 9px}
.ch2-brow{width:14px;height:4px;background:#3d2600;border-radius:3px}
.ch2-brow.l{transform:rotate(-5deg)}
.ch2-brow.r{transform:rotate(5deg)}
/* intense angry */
.ch2-brow.intense.l{transform:rotate(-12deg);background:#2a1800}
.ch2-brow.intense.r{transform:rotate(12deg);background:#2a1800}
/* raised surprised */
.ch2-brow.raised{top:10px;height:3px}
.ch2-brow.raised.l{transform:rotate(-8deg)}
.ch2-brow.raised.r{transform:rotate(8deg)}
/* worried */
.ch2-brow.worried.l{transform:rotate(8deg);top:16px}
.ch2-brow.worried.r{transform:rotate(-8deg);top:16px}

/* NOSE */
.ch2-nose{width:6px;height:4px;position:absolute;top:35px;left:50%;transform:translateX(-50%);
  border-radius:0 0 50% 50%;background:rgba(0,0,0,.1)}

/* MOUTH types */
.ch2-mouth{position:absolute;bottom:11px;left:50%;transform:translateX(-50%)}
.ch2-mouth.smile{width:20px;height:10px;border-radius:0 0 14px 14px;background:#d06040;border-top:none}
.ch2-mouth.smile::before{content:'';position:absolute;top:0;left:2px;right:2px;height:2px;background:#f08060;border-radius:2px}
.ch2-mouth.grin{width:24px;height:12px;border-radius:0 0 16px 16px;background:#d06040}
.ch2-mouth.grin::after{content:'';position:absolute;top:2px;left:3px;right:3px;height:5px;
  background:#fff;border-radius:0 0 6px 6px}
.ch2-mouth.open{width:14px;height:14px;border-radius:50%;background:#c05030}
.ch2-mouth.open::after{content:'';position:absolute;top:4px;left:3px;right:3px;height:5px;background:#fff;border-radius:50%}
.ch2-mouth.smirk{width:16px;height:8px;border-radius:0 0 14px 6px;background:#c05030;transform:translateX(-45%) rotate(-6deg)}
.ch2-mouth.neutral{width:16px;height:3px;border-radius:2px;background:#b05040;bottom:12px}

/* GLASSES overlay */
.ch2-glasses{
  position:absolute;top:21px;left:7px;width:58px;height:18px;
  pointer-events:none;
}
.ch2-glasses::before,.ch2-glasses::after{
  content:'';position:absolute;width:20px;height:16px;
  border:2.5px solid rgba(80,100,200,.9);border-radius:50%;
  background:rgba(120,140,255,.07);
  top:0;
}
.ch2-glasses::before{left:4px}
.ch2-glasses::after{right:4px}
.ch2-glasses-bridge{
  position:absolute;top:6px;left:50%;transform:translateX(-50%);
  width:8px;height:2.5px;background:rgba(80,100,200,.9);border-radius:1px;
}

/* EARS */
.ch2-ear{
  position:absolute;width:12px;height:14px;
  background:var(--skin,#F5B98A);border-radius:50%;
  top:20px;
}
.ch2-ear.l{left:2px;box-shadow:inset 2px 1px 0 rgba(0,0,0,.1)}
.ch2-ear.r{right:2px;box-shadow:inset -2px 1px 0 rgba(0,0,0,.1)}

/* BODY */
.ch2-body{
  width:52px;height:50px;
  border-radius:14px 14px 10px 10px;
  position:absolute;bottom:0;left:10px;
  box-shadow:inset 0 3px 0 rgba(255,255,255,.07);
}
.ch2-collar{
  position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:20px;height:10px;
  background:rgba(255,255,255,.15);border-radius:0 0 8px 8px;
}
/* Shirt buttons */
.ch2-btn-row{
  position:absolute;top:14px;left:50%;transform:translateX(-50%);
  display:flex;flex-direction:column;gap:5px;align-items:center;
}
.ch2-shbtn{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.3)}

/* TIE */
.ch2-tie{
  position:absolute;top:10px;left:50%;transform:translateX(-50%);
  width:9px;height:22px;background:var(--acc,#f59e0b);
  border-radius:2px 2px 5px 5px;z-index:4;
}
.ch2-tie::before{
  content:'';position:absolute;top:-5px;left:-4px;width:17px;height:7px;
  background:var(--acc,#f59e0b);border-radius:3px;
}
.ch2-tie::after{
  content:'';position:absolute;top:2px;left:1px;right:1px;height:3px;
  background:rgba(0,0,0,.2);border-radius:1px;
}

/* NECK */
.ch2-neck{
  width:14px;height:10px;
  background:var(--skin,#F5B98A);
  position:absolute;bottom:48px;left:29px;
  box-shadow:inset 0 2px 0 rgba(0,0,0,.08);
}

/* ARMS */
.ch2-arms{position:absolute;bottom:8px;left:10px;width:52px}
.ch2-arm{
  position:absolute;width:12px;height:30px;
  background:var(--body,#1a1a1a);
  border-radius:6px;
}
.ch2-arm.l{left:-8px;transform:rotate(15deg);transform-origin:top center}
.ch2-arm.r{right:-8px;transform:rotate(-15deg);transform-origin:top center}
/* Hands */
.ch2-arm.l::after,.ch2-arm.r::after{
  content:'';position:absolute;bottom:-6px;left:50%;transform:translateX(-50%);
  width:10px;height:10px;border-radius:50%;
  background:var(--skin,#F5B98A);
}
/* Working arm animation */
.chibi-root.working .ch2-arm.l{animation:arml2 .45s ease-in-out infinite alternate}
.chibi-root.working .ch2-arm.r{animation:armr2 .45s ease-in-out infinite alternate}
@keyframes arml2{from{transform:rotate(15deg)}to{transform:rotate(30deg)}}
@keyframes armr2{from{transform:rotate(-15deg)}to{transform:rotate(-30deg)}}
/* Walking arms */
.chibi-root.walking .ch2-arm.l{animation:walk-arml .5s ease-in-out infinite alternate}
.chibi-root.walking .ch2-arm.r{animation:walk-armr .5s ease-in-out infinite alternate}
@keyframes walk-arml{from{transform:rotate(30deg)}to{transform:rotate(-20deg)}}
@keyframes walk-armr{from{transform:rotate(-30deg)}to{transform:rotate(20deg)}}

/* LEGS */
.ch2-legs{position:absolute;bottom:-16px;left:16px;display:flex;gap:6px}
.ch2-leg{
  width:10px;height:16px;
  background:var(--body,#1a1a1a);
  border-radius:2px 2px 4px 4px;
  position:relative;
}
.ch2-leg::after{
  content:'';position:absolute;bottom:-5px;left:-2px;
  width:14px;height:6px;
  background:#2a2020;border-radius:0 0 4px 4px;
}
/* Walking legs */
.chibi-root.walking .ch2-leg:nth-child(1){animation:walk-leg1 .5s ease-in-out infinite alternate}
.chibi-root.walking .ch2-leg:nth-child(2){animation:walk-leg2 .5s ease-in-out infinite alternate}
@keyframes walk-leg1{from{transform:rotate(-15deg)}to{transform:rotate(15deg)}}
@keyframes walk-leg2{from{transform:rotate(15deg)}to{transform:rotate(-15deg)}}

/* PROP / item */
.ch2-prop{
  position:absolute;font-size:16px;
  filter:drop-shadow(0 1px 3px rgba(0,0,0,.5));
  animation:prop-idle 2s ease-in-out infinite;
}
@keyframes prop-idle{0%,100%{transform:rotate(-5deg)}50%{transform:rotate(5deg)}}

/* THOUGHT BUBBLE */
.ch2-thought{
  display:none;position:absolute;top:-42px;left:50%;transform:translateX(-50%);
  background:#fff;color:#333;font-size:10px;font-weight:700;
  border-radius:14px;padding:5px 10px;white-space:nowrap;z-index:20;
  box-shadow:0 3px 12px rgba(0,0,0,.4);
}
.ch2-thought::before{content:'•';position:absolute;bottom:-10px;left:calc(50% - 3px);font-size:10px;color:#fff}
.ch2-thought::after{content:'•';position:absolute;bottom:-16px;left:calc(50% - 2px);font-size:7px;color:#fff}
.ch2-thought.show{display:block;animation:fadeup .3s ease}
@keyframes fadeup{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* ──────── WALKER chibi floating between desks ──────── */
.walker{
  position:absolute;bottom:190px;z-index:15;
  pointer-events:none;
  animation:walk-across 12s linear infinite;
}
@keyframes walk-across{
  0%{left:-90px;transform:scaleX(1)}
  49%{transform:scaleX(1)}
  50%{left:calc(100% + 10px);transform:scaleX(-1)}
  99%{transform:scaleX(-1)}
  100%{left:-90px;transform:scaleX(1)}
}

/* ── CLOCK ── */
function initClock() {
  function tick() {
    const now = new Date();
    const hrs = now.getHours() % 12;
    const min = now.getMinutes();
    const sec = now.getSeconds();
    const hDeg = (hrs * 30) + (min * 0.5);
    const mDeg = (min * 6) + (sec * 0.1);
    const hr = document.getElementById('hrHand');
    const mn = document.getElementById('minHand');
    if(hr) hr.style.transform = `rotate(${hDeg}deg)`;
    if(mn) mn.style.transform = `rotate(${mDeg}deg)`;
  }
  tick();
  setInterval(tick, 1000);
}

/* ── IDLE ROTATION ── */
function startIdleRotation() {
  setInterval(() => {
    EXPERTS.forEach(e => {
      const card = document.getElementById('card_' + e.id);
      if (card && !card.classList.contains('active')) {
        const idx = Math.floor(Math.random() * e.activities.length);
        const act = document.getElementById('act_' + e.id);
        if(act) act.textContent = e.activities[idx];
      }
    });
  }, 3500);

  // Randomly wake one character briefly
  setInterval(() => {
    const e = EXPERTS[Math.floor(Math.random() * EXPERTS.length)];
    const sceneRoot = document.querySelector(`#scene_chibi_${e.id} .chibi-root`);
    if(sceneRoot && sceneRoot.className.includes('idle')) {
      sceneRoot.className = 'chibi-root working';
      setTimeout(() => { sceneRoot.className = 'chibi-root idle'; }, 2000);
    }
  }, 4000);
}

function spotlight(id) {
  const sceneEl = document.querySelector(`#scene_chibi_${id} .chibi-root`);
  if(sceneEl){ sceneEl.style.transform='scale(1.2)'; setTimeout(()=>{sceneEl.style.transform=''},400); }
}

/* ── STATE MANAGEMENT ── */
function setState(id, state) {
  const card  = document.getElementById('card_' + id);
  const dot   = document.getElementById('dot_' + id);
  const stxt  = document.getElementById('stxt_' + id);
  const typing  = document.getElementById('typing_' + id);

  // Card chibi
  const cardRoot = document.getElementById('card-chibi-root_' + id);
  const cardThought = document.getElementById('thought_card-chibi-root_' + id);
  // Scene chibi
  const sceneRoot = document.querySelector(`#scene_chibi_${id} .chibi-root`);
  const sceneThought = document.querySelector(`#scene_chibi_${id} .ch2-thought`);

  card.classList.remove('active');
  if(cardRoot) cardRoot.className = 'card-chibi-root';
  if(cardThought) cardThought.classList.remove('show');
  if(sceneRoot) sceneRoot.className = 'chibi-root';
  if(sceneThought) sceneThought.classList.remove('show');
  dot.className = 'sdot';
  typing.classList.remove('show');

  if (state === 'thinking') {
    card.classList.add('active');
    if(cardRoot) cardRoot.className = 'card-chibi-root thinking';
    if(cardThought) cardThought.classList.add('show');
    if(sceneRoot) sceneRoot.className = 'chibi-root thinking';
    if(sceneThought) sceneThought.classList.add('show');
    dot.classList.add('thinking');
    stxt.textContent = '분석 중...';
  } else if (state === 'working') {
    card.classList.add('active');
    if(cardRoot) cardRoot.className = 'card-chibi-root working';
    if(sceneRoot) sceneRoot.className = 'chibi-root working';
    dot.classList.add('thinking');
    stxt.textContent = '작성 중...';
    typing.classList.add('show');
  } else if (state === 'speaking') {
    card.classList.add('active');
    if(cardRoot) cardRoot.className = 'card-chibi-root speaking';
    if(sceneRoot) sceneRoot.className = 'chibi-root speaking';
    dot.classList.add('speaking');
    stxt.textContent = '답변 중...';
  } else {
    if(cardRoot) cardRoot.className = 'card-chibi-root idle';
    if(sceneRoot) sceneRoot.className = 'chibi-root idle';
    dot.classList.add('on');
    stxt.textContent = '대기 중';
  }
}

/* ── ROUTING ── */
function route(q) {
  const lower = q.toLowerCase();
  let best = EXPERTS[0]; let top = -1;
  EXPERTS.forEach(e => {
    const score = e.keywords.filter(k => lower.includes(k)).length;
    if (score > top) { top = score; best = e; }
  });
  return best;
}

/* ── CHAT ── */
function fill(txt) {
  document.getElementById('inp').value = txt;
  document.getElementById('inp').focus();
}

async function send() {
  if (busy) return;
  if (!apiKey) { toast('먼저 Claude API 키를 입력하고 연결 버튼을 눌러주세요'); return; }
  const inp = document.getElementById('inp');
  const q = inp.value.trim();
  if (!q) return;

  busy = true;
  inp.value = '';
  document.getElementById('sendbtn').disabled = true;

  addMsg('user', '나', q, '🙋', '#6366f1', false);

  const expert = route(q);
  const router = document.getElementById('router');
  document.getElementById('routerName').textContent = expert.name;
  router.classList.add('show');
  setTimeout(() => router.classList.remove('show'), 2000);

  setState(expert.id, 'thinking');
  document.getElementById('card_' + expert.id).scrollIntoView({ behavior: 'smooth', block: 'nearest' });

  await delay(900);
  setState(expert.id, 'working');

  let answer = '';
  try {
    answer = await callClaude(q, expert);
  } catch(err) {
    answer = '⚠️ ' + (err.message || 'API 오류. 키를 확인해주세요.');
  }

  setState(expert.id, 'speaking');

  const resp = document.getElementById('resp_' + expert.id);
  resp.textContent = '';
  resp.classList.add('show');
  await typewrite(resp, answer, 18);

  addMsg('expert', `${expert.emoji} ${expert.name}`, answer, expert.emoji, expert.acc, true);

  setTimeout(() => {
    resp.classList.remove('show');
    setState(expert.id, 'idle');
  }, 10000);

  busy = false;
  document.getElementById('sendbtn').disabled = false;
}

function addMsg(type, name, text, icon, color, isExpert) {
  const log = document.getElementById('chatlog');
  const welcome = log.querySelector('div[style*="text-align"]');
  if (welcome) welcome.remove();
  const d = document.createElement('div');
  d.className = 'cmsg ' + (type === 'user' ? 'user' : '');
  d.innerHTML = `
    <div class="cav ${type==='user'?'me':''}"
         style="${isExpert?`background:${color}22;border:1px solid ${color}44;font-size:15px`:''}">
      ${icon}
    </div>
    <div class="cbody">
      <div class="cwho">${name}</div>
      <div class="cbubble" style="${isExpert?`border-color:${color}33`:''}">
        ${text.replace(/\n/g,'<br>')}
      </div>
    </div>`;
  log.appendChild(d);
  log.scrollTop = log.scrollHeight;
}

/* ── TYPEWRITER ── */
async function typewrite(el, text, speed) {
  el.textContent = '';
  for (let i = 0; i < text.length; i++) {
    el.textContent += text[i];
    if (i % 4 === 0) await delay(speed);
  }
}

/* ── CLAUDE API ── */
async function callClaude(q, expert) {
  const prompt = `${expert.persona}

---
사용자 질문: "${q}"

위 전문가의 정체성으로 핵심 조언을 해주세요.
- 첫 문장에 핵심 결론
- 해당 전문가만의 프레임워크/공식 사용
- 구체적이고 즉시 실행 가능하게
- 서론·인사 없이 바로 답변
- 300자 이내`;

  const res = await fetch(
    'https://api.anthropic.com/v1/messages',
    {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-ipc': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 500,
        messages: [{ role: 'user', content: prompt }]
      })
    }
  );
  if (!res.ok) {
    const code = res.status;
    if (code === 429) throw new Error('API 한도 초과. 잠시 후 다시 시도하세요');
    if (code === 401 || code === 403) throw new Error('API 키를 확인하세요 (sk-ant-... 형식)');
    if (code === 400) throw new Error('요청 오류. 다시 시도해주세요');
    throw new Error(`API 오류 (${code})`);
  }
  const data = await res.json();
  return data?.content?.[0]?.text || '응답을 받지 못했습니다.';
}

function saveKey() {
  const v = document.getElementById('apiKey').value.trim();
  if (!v) { toast('API 키를 입력해주세요'); return; }
  apiKey = v;
  localStorage.setItem('claude_key', v);
  toast('✅ Claude 연결 완료! 팀이 준비됐습니다');
}
function delay(ms) { return new Promise(r => setTimeout(r, ms)); }
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}
