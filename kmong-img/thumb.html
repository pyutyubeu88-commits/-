<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1200px;height:900px;overflow:hidden}
body{font-family:'Noto Sans KR',sans-serif;background:#1B4332;color:#fff;
  position:relative;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;-webkit-print-color-adjust:exact}
.glow{position:absolute;top:-160px;right:-160px;width:680px;height:680px;border-radius:50%;
  background:radial-gradient(circle,rgba(64,145,108,.35) 0%,transparent 70%)}
.glow2{position:absolute;bottom:-200px;left:-160px;width:600px;height:600px;border-radius:50%;
  background:radial-gradient(circle,rgba(255,183,3,.12) 0%,transparent 70%)}
.badge{position:relative;background:rgba(255,183,3,.16);border:2px solid rgba(255,183,3,.6);
  color:#FFB703;font-size:24px;font-weight:700;padding:12px 32px;border-radius:100px;margin-bottom:40px}
h1{position:relative;font-size:88px;font-weight:900;line-height:1.18;letter-spacing:-3px;margin-bottom:26px}
h1 .g{color:#74C69D}
.sub{position:relative;font-size:32px;color:rgba(255,255,255,.85);font-weight:500;margin-bottom:50px}
.big{position:relative;display:flex;align-items:baseline;gap:18px;margin-bottom:14px}
.big .n{font-size:170px;font-weight:900;color:#FFB703;line-height:.9;letter-spacing:-4px}
.big .t{text-align:left}
.big .t .l1{font-size:40px;font-weight:900;color:#fff}
.big .t .l2{font-size:26px;color:rgba(255,255,255,.7);font-weight:500}
.steps{position:relative;display:flex;gap:14px;margin-top:14px}
.chip{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:12px;
  padding:12px 22px;font-size:24px;font-weight:700}
.chip b{color:#FFB703}
.foot{position:absolute;bottom:46px;font-size:24px;color:rgba(255,255,255,.55);font-weight:500}
</style></head><body>
<div class="glow"></div><div class="glow2"></div>
<div class="badge">강남구 소상공인 AI 컨설턴트 검증</div>
<h1>소상공인 <span class="g">AI 프롬프트북</span><br>복붙만 하면 끝</h1>
<div class="sub">사장님 대신 일하는 AI 비서, 실전 프롬프트 모음집</div>
<div class="big"><div class="n">80</div><div class="t"><div class="l1">실전 프롬프트</div><div class="l2">8개 챕터 · 50페이지</div></div></div>
<div class="steps"><div class="chip"><b>복붙</b> 하고</div><div class="chip"><b>빈칸</b> 채우면</div><div class="chip"><b>완성</b> ✨</div></div>
<div class="foot">ChatGPT · Gemini · Claude 어디서나 작동</div>
</body></html>
