<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1200px;height:900px;overflow:hidden}
body{font-family:'Noto Sans KR',sans-serif;background:#1B4332;color:#fff;
  position:relative;display:flex;flex-direction:column;justify-content:center;padding:0 90px;-webkit-print-color-adjust:exact}
.glow{position:absolute;top:-180px;right:-140px;width:660px;height:660px;border-radius:50%;
  background:radial-gradient(circle,rgba(64,145,108,.38) 0%,transparent 70%)}
.glow2{position:absolute;bottom:-220px;left:-180px;width:620px;height:620px;border-radius:50%;
  background:radial-gradient(circle,rgba(255,183,3,.13) 0%,transparent 70%)}
.kick{position:relative;font-size:22px;font-weight:800;letter-spacing:5px;color:#FFB703;margin-bottom:26px}
h1{position:relative;font-size:76px;font-weight:900;line-height:1.22;letter-spacing:-2.5px;margin-bottom:30px}
h1 .g{color:#74C69D}
.sub{position:relative;font-size:27px;color:rgba(255,255,255,.82);line-height:1.6;max-width:820px;margin-bottom:54px}
.stats{position:relative;display:flex;gap:20px;margin-bottom:50px}
.stat{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.16);border-radius:18px;padding:24px 34px;text-align:center}
.stat .v{font-size:52px;font-weight:900;color:#FFB703;line-height:1;letter-spacing:-2px}
.stat .l{font-size:18px;color:rgba(255,255,255,.78);margin-top:10px;font-weight:600}
.by{position:absolute;bottom:54px;left:90px;font-size:22px;color:rgba(255,255,255,.62);font-weight:500}
.by b{color:#fff;font-weight:800}
.badge{position:absolute;top:54px;right:90px;background:rgba(255,183,3,.16);border:2px solid rgba(255,183,3,.55);color:#FFB703;font-size:19px;font-weight:700;padding:10px 26px;border-radius:100px}
</style></head><body>
<div class="glow"></div><div class="glow2"></div>
<div class="badge">강남구 소상공인 AI 컨설턴트</div>
<div class="kick">WORK PORTFOLIO</div>
<h1>소상공인 매출을 바꾸는<br><span class="g">AI 프롬프트 설계</span></h1>
<div class="sub">현장에서 검증한 실전 프롬프트를, 사장님 누구나 복붙해서 쓰도록 설계합니다.</div>
<div class="stats">
  <div class="stat"><div class="v">80</div><div class="l">실전 프롬프트</div></div>
  <div class="stat"><div class="v">8</div><div class="l">업무 분야</div></div>
  <div class="stat"><div class="v">3종</div><div class="l">세트 구성</div></div>
</div>
<div class="by"><b>강남AI컨설턴트 권용준</b> · 소상공인 AI 활용 · 마케팅 자동화 · 프롬프트 설계</div>
</body></html>
